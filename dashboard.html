<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Text Converter - Shop Style</title>
    <style>
        /* ใช้ Root เดิมเป๊ะๆ เพื่อรักษา Mood & Tone */
        :root {
            --x-bg-main: hsl(0, 0%, 100%);
            --x-bg-subdued: hsl(0, 0%, 96%); 
            --x-border: hsl(0, 0%, 87%);
            --x-border-dark: hsl(0, 0%, 84%);
            --x-text-main: hsl(0, 0%, 0%);
            --x-text-subdued: hsl(0, 0%, 44%);
            --x-primary: #5b00ed; 
            --x-primary-hover: #4a00c2;
            --x-primary-light: #F5F6FF;
            --x-radius-base: 8px;
            --x-radius-large: 12px;
            --x-shadow-base: 0 4px 12px rgba(0, 0, 0, 0.1);
            --x-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --x-bg-main: #121212;       
            --x-bg-subdued: #1A1A1A;      
            --x-border: #333333;
            --x-border-dark: #444444;
            --x-text-main: #F5F5F5;
            --x-text-subdued: #A0A0A0;
            --x-primary: #8C52FF;
            --x-primary-light: #2A1E4A;
        }

        html { font-size: 62.5%; }
        body { 
            font-family: var(--x-font-family); font-size: 1.4rem; line-height: 1.5;
            margin: 0; background-color: var(--x-bg-main); color: var(--x-text-main);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Header */
        .top-header { background: var(--x-bg-main); border-bottom: 1px solid var(--x-border); padding: 1.5rem 4rem; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header-logo { font-size: 2.1rem; font-weight: bold; color: var(--x-primary); }

        .layout-container { display: flex; flex: 1; width: 100%; max-width: 1200px; margin: 0 auto; }

        /* Left Panel: Input Area */
        .management-panel { flex: 1.4; padding: 4rem 4rem 8rem 0; box-sizing: border-box; }
        .section-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 1.5rem; color: var(--x-primary); }

        textarea {
            width: 100%; background: var(--x-bg-subdued); border: 1px solid var(--x-border-dark);
            padding: 1.5rem; border-radius: var(--x-radius-large); color: var(--x-text-main);
            font-size: 1.6rem; min-height: 300px; resize: vertical; outline: none; transition: 0.2s;
        }
        textarea:focus { border-color: var(--x-primary); box-shadow: 0 0 0 1px var(--x-primary); background: var(--x-bg-main); }

        /* Right Panel: Output & Controls */
        .summary-panel { 
            flex: 1; background-color: var(--x-bg-subdued); border-left: 1px solid var(--x-border);
            position: sticky; top: 0; height: 100vh; padding: 4rem; box-sizing: border-box;
        }

        .tool-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .btn-tool {
            background: var(--x-bg-main); border: 1px solid var(--x-border-dark);
            padding: 1.2rem; border-radius: var(--x-radius-base); cursor: pointer;
            color: var(--x-text-main); font-weight: 500; transition: 0.2s;
        }
        .btn-tool:hover { border-color: var(--x-primary); color: var(--x-primary); background: var(--x-primary-light); }

        .output-box {
            background: var(--x-bg-main); border: 1px solid var(--x-border);
            padding: 1.5rem; border-radius: var(--x-radius-large); margin-top: 1rem;
            min-height: 150px; white-space: pre-wrap; word-break: break-word; position: relative;
        }

        .btn-copy {
            background: var(--x-primary); color: white; border: none; width: 100%;
            padding: 1.5rem; border-radius: var(--x-radius-base); font-weight: bold;
            margin-top: 2rem; cursor: pointer; transition: 0.3s;
        }
        .btn-copy:hover { background: var(--x-primary-hover); transform: translateY(-2px); }

        @media (max-width: 1000px) {
            .layout-container { flex-direction: column; }
            .summary-panel { position: static; height: auto; border-left: none; border-top: 1px solid var(--x-border); padding: 2rem; }
            .management-panel { padding: 2rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-content">
            <div class="header-logo">Text Transformer Pro</div>
            <button class="btn-tool" onclick="toggleTheme()">🌗 Mode</button>
        </div>
    </header>

    <div class="layout-container">
        <main class="management-panel">
            <h2 class="section-title">Input Text</h2>
            <textarea id="inputText" placeholder="พิมพ์หรือวางข้อความที่นี่..." oninput="autoConvert()"></textarea>
        </main>

        <aside class="summary-panel">
            <h2 class="section-title">Tools</h2>
            <div class="tool-group">
                <button class="btn-tool" onclick="transform('upper')">ABC (ตัวพิมพ์ใหญ่)</button>
                <button class="btn-tool" onclick="transform('lower')">abc (ตัวพิมพ์เล็ก)</button>
                <button class="btn-tool" onclick="transform('clean')">ลบช่องว่างส่วนเกิน</button>
                <button class="btn-tool" onclick="transform('reverse')">ย้อนกลับข้อความ</button>
            </div>

            <h2 class="section-title">Preview Result</h2>
            <div class="output-box" id="outputPreview">ผลลัพธ์จะปรากฏที่นี่...</div>
            
            <button class="btn-copy" onclick="copyToClipboard()">Copy Result</button>
        </aside>
    </div>

    <script>
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function transform(type) {
            const input = document.getElementById('inputText').value;
            let result = "";

            switch(type) {
                case 'upper': result = input.toUpperCase(); break;
                case 'lower': result = input.toLowerCase(); break;
                case 'clean': result = input.trim().replace(/\s+/g, ' '); break;
                case 'reverse': result = input.split('').reverse().join(''); break;
            }
            document.getElementById('outputPreview').innerText = result;
        }

        function autoConvert() {
            const input = document.getElementById('inputText').value;
            document.getElementById('outputPreview').innerText = input;
        }

        function copyToClipboard() {
            const text = document.getElementById('outputPreview').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('คัดลอกข้อความสำเร็จ!');
            });
        }
    </script>
</body>
</html>
