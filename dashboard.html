<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Text Transformer V9.7</title>
    <style>
        /* --- CSS Root & Theme (Shop V21 Style) --- */
        :root {
            --x-bg-main: hsl(0, 0%, 100%);
            --x-bg-subdued: hsl(0, 0%, 96%); 
            --x-border: hsl(0, 0%, 87%);
            --x-border-dark: hsl(0, 0%, 84%);
            --x-text-main: hsl(0, 0%, 0%);
            --x-text-subdued: hsl(0, 0%, 44%);
            --x-primary: #5b00ed; 
            --x-primary-hover: #4a00c2;
            --x-primary-light: #F5F6FF;
            --x-setting-gray: #808080;
            --x-danger: #D91C1C;
            --x-radius-base: 8px;
            --x-radius-large: 12px;
            --x-shadow-base: 0 4px 12px rgba(0, 0, 0, 0.1);
            --x-shadow-modal: 0 10px 30px rgba(0, 0, 0, 0.2);
            --x-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --x-bg-main: #121212; --x-bg-subdued: #1A1A1A; --x-border: #333333;
            --x-border-dark: #444444; --x-text-main: #F5F5F5; --x-text-subdued: #A0A0A0;
            --x-primary: #8C52FF; --x-primary-light: #2A1E4A;
        }

        html { font-size: 62.5%; }
        body { 
            font-family: var(--x-font-family); font-size: 1.4rem; line-height: 1.5;
            margin: 0; background-color: var(--x-bg-main); color: var(--x-text-main);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Header */
        .top-header { background: var(--x-bg-main); border-bottom: 1px solid var(--x-border); padding: 1.5rem 2rem; position: sticky; top:0; z-index: 1000;}
        .header-content { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header-logo { font-size: 2.1rem; font-weight: bold; color: var(--x-primary); }

        /* Layout */
        .layout-container { display: flex; flex: 1; width: 100%; max-width: 1000px; margin: 0 auto; }
        .management-panel { flex: 1; padding: 4rem; box-sizing: border-box; }
        .summary-panel { 
            flex: 1; background-color: var(--x-bg-subdued); border-left: 1px solid var(--x-border);
            position: sticky; top: 6rem; height: calc(100vh - 6rem); padding: 4rem; box-sizing: border-box; overflow-y: auto;
        }

        /* --- Sections --- */
        .section-title { font-size: 1.8rem; font-weight: bold; color: var(--x-primary); margin: 0;}
        .collapsible-section { border-top: 1px solid var(--x-border); padding-top: 1rem; margin-top: 1rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 0.5rem; }
        
        /* Textarea */
        .output-wrapper { position: relative; width: 100%; margin-bottom: 1.5rem;}
        textarea.final-output { 
            width: 100%; background: var(--x-bg-subdued); border: 1px solid var(--x-border-dark); 
            border-radius: var(--x-radius-large); padding: 1.5rem; font-family: inherit; font-size: 1.4rem; color: var(--x-text-main); resize: vertical; outline: none; box-sizing: border-box;
        }

        /* iOS Toggle Switch */
        .shipping-item { display: flex; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid var(--x-border); gap: 1rem; }
        .ios-switch { position: relative; display: inline-block; width: 4.2rem; height: 2.4rem; flex-shrink: 0; }
        .ios-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background-color: var(--x-border-dark); border-radius: 3rem; transition: .3s; cursor: pointer;}
        .slider:before { position: absolute; content: ""; height: 2rem; width: 2rem; left: 0.2rem; bottom: 0.2rem; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--x-primary); }
        input:checked + .slider:before { transform: translateX(1.8rem); content: '✓'; color: var(--x-primary); display: flex; align-items: center; justify-content: center; font-size: 1rem; }

        /* List Items & Bulk Menu */
        .list-item-row { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid var(--x-border); }
        .list-info { flex: 1; font-size: 1.4rem; }
        .grid-mode { display: grid; grid-template-columns: 1fr 2rem 1fr; gap: 0.8rem; align-items: center; }
        
        .option-btn { background: transparent; border: none; color: var(--x-setting-gray); cursor: pointer; padding: 0.5rem; border-radius: 50%; }
        .option-btn:hover { background: var(--x-bg-subdued); }

        .dropdown-container { position: relative; }
        .dropdown-menu { position: absolute; right: 0; top: 100%; background: var(--x-bg-main); border: 1px solid var(--x-border); border-radius: 8px; box-shadow: var(--x-shadow-base); display: none; z-index: 100; min-width: 120px; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 1rem; cursor: pointer; }
        .dropdown-item:hover { background: var(--x-bg-subdued); }
        .dropdown-item.delete { color: var(--x-danger); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--x-bg-main); border-radius: 12px; width: 90%; max-width: 400px; padding: 2.5rem; box-shadow: var(--x-shadow-modal); }

        @media (max-width: 800px) {
            .layout-container { flex-direction: column; }
            .summary-panel { position: static; height: auto; border-left: none; width: 100%; padding: 2rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-content">
            <div class="header-logo">Text Transformer</div>
            <button onclick="toggleTheme()" style="background:none; border:1px solid var(--x-border); padding:0.6rem 1.2rem; border-radius:8px; cursor:pointer; color:inherit;">🌗 Theme</button>
        </div>
    </header>

    <div class="layout-container">
        <main class="management-panel">
            <h2 class="section-title" style="margin-bottom: 1.5rem;">Input Text</h2>
            <div class="output-wrapper">
                <textarea id="inputText" class="final-output" style="min-height: 200px;" placeholder="วางข้อความที่นี่..." oninput="processText()"></textarea>
            </div>

            <div class="collapsible-section" id="sec-collection">
                <div class="section-header">
                    <h2 class="section-title">Collection List</h2>
                    <div class="dropdown-container">
                        <button class="option-btn" onclick="toggleDropdown(event, this)">⋮</button>
                        <div class="dropdown-menu">
                            <div class="dropdown-item" onclick="bulkAction('collection', 'selectAll')">Select All</div>
                            <div class="dropdown-item" onclick="bulkAction('collection', 'deselectAll')">Deselect All</div>
                            <div class="dropdown-item delete" onclick="bulkAction('collection', 'deleteSelected')">Delete Selected</div>
                        </div>
                    </div>
                </div>
                <div id="collectionInputs"></div>
                <button onclick="openModal('collection')" style="background:none; border:none; color:var(--x-primary); cursor:pointer; padding:1rem 0;">+ Add Collection</button>
            </div>

            <div class="collapsible-section" id="sec-replace">
                <div class="section-header">
                    <h2 class="section-title">Replace List</h2>
                    <div class="dropdown-container">
                        <button class="option-btn" onclick="toggleDropdown(event, this)">⋮</button>
                        <div class="dropdown-menu">
                            <div class="dropdown-item" onclick="bulkAction('replace', 'selectAll')">Select All</div>
                            <div class="dropdown-item" onclick="bulkAction('replace', 'deselectAll')">Deselect All</div>
                            <div class="dropdown-item delete" onclick="bulkAction('replace', 'deleteSelected')">Delete Selected</div>
                        </div>
                    </div>
                </div>
                <div id="replaceInputs"></div>
                <button onclick="openModal('replace')" style="background:none; border:none; color:var(--x-primary); cursor:pointer; padding:1rem 0;">+ Add Replacement</button>
            </div>
        </main>

        <aside class="summary-panel">
            <h2 class="section-title">Conditions</h2>
            <div class="shipping-item">
                <div style="flex:1;"><b>UPPERCASE</b></div>
                <label class="ios-switch"><input type="checkbox" id="opt_upper" onchange="processText()"><span class="slider"></span></label>
            </div>
            <div class="shipping-item">
                <div style="flex:1;"><b>Single Space</b></div>
                <label class="ios-switch"><input type="checkbox" id="opt_clean_space" onchange="processText()" checked><span class="slider"></span></label>
            </div>
            <div class="shipping-item">
                <div style="flex:1;"><b>Remove Price</b></div>
                <label class="ios-switch"><input type="checkbox" id="opt_remove_prices" onchange="processText()"><span class="slider"></span></label>
            </div>

            <h2 class="section-title" style="margin-top:3rem;">Result</h2>
            <div class="output-wrapper">
                <textarea id="outputText" class="final-output" style="min-height: 200px; background: var(--x-bg-main);" readonly placeholder="รอข้อความ..."></textarea>
                <button onclick="copyToClipboard()" style="margin-top:1rem; width:100%; padding:1.2rem; background:var(--x-primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Copy Result</button>
            </div>
            
            <div style="display:flex; gap:1rem; justify-content:center; margin-top:2rem;">
                <button onclick="exportSettings()" style="background:none; border:none; color:var(--x-text-subdued); cursor:pointer;">Export</button>
                <button onclick="importSettings()" style="background:none; border:none; color:var(--x-text-subdued); cursor:pointer;">Import</button>
            </div>
            <div style="text-align: center; color: var(--x-border-dark); font-size: 1.1rem; margin-top: 1rem;">Version 9.7</div>
        </aside>
    </div>

    <div class="modal-overlay" id="generalModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0;">Add Item</h3>
            <div style="margin-bottom:1.5rem;">
                <label style="font-size:1.2rem; color:var(--x-text-subdued);">ข้อความต้นทาง</label>
                <input type="text" id="modalFrom" style="width:100%; padding:1rem; border:1px solid var(--x-border); border-radius:5px; box-sizing:border-box;">
            </div>
            <div id="modalToContainer" style="margin-bottom:1.5rem;">
                <label style="font-size:1.2rem; color:var(--x-text-subdued);">เปลี่ยนเป็น</label>
                <input type="text" id="modalTo" style="width:100%; padding:1rem; border:1px solid var(--x-border); border-radius:5px; box-sizing:border-box;">
            </div>
            <div style="display:flex; gap:1rem; justify-content:flex-end;">
                <button onclick="closeModal()" style="background:none; border:none; cursor:pointer;">Cancel</button>
                <button onclick="saveModal()" style="background:var(--x-primary); color:white; border:none; padding:0.8rem 1.8rem; border-radius:5px; cursor:pointer;">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentModalMode = 'replace';
        let currentEditingRow = null;

        // --- Logic หลัก V9.7 (คั่นด้วย / และบรรทัดเดียว) ---
        function processText() {
            let text = document.getElementById('inputText').value;

            // 1. Replace List
            document.querySelectorAll('#replaceInputs .list-item-row').forEach(row => {
                if (row.querySelector('.list-check').checked) {
                    const from = row.querySelector('.val-from').value;
                    const to = row.querySelector('.val-to').value;
                    if (from) text = text.replace(new RegExp(from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), to);
                }
            });

            // 2. Collection Grouping
            let activeCols = Array.from(document.querySelectorAll('#collectionInputs .list-item-row'))
                .filter(r => r.querySelector('.list-check').checked)
                .map(r => r.querySelector('.val-from').value.trim());

            let lines = text.split('\n').map(s => s.trim()).filter(s => s !== '');
            let resultGroups = [];
            let currentGroup = null;

            for (let line of lines) {
                let foundCol = activeCols.find(c => line.toLowerCase().includes(c.toLowerCase()));
                if (foundCol) {
                    if (currentGroup) resultGroups.push(currentGroup);
                    currentGroup = { header: line, items: [] };
                } else if (currentGroup) {
                    currentGroup.items.push(line);
                } else {
                    currentGroup = { header: '', items: [line] };
                }
            }
            if (currentGroup) resultGroups.push(currentGroup);

            // 3. Formatting Output (รวมเป็นบรรทัดเดียว คั่นด้วย /)
            let formattedGroups = resultGroups.map(group => {
                let h = group.header ? group.header + " = " : "";
                let i = group.items.join(' / ');
                return h + i;
            });

            let final = formattedGroups.join(' / ');

            // 4. Conditions
            if (document.getElementById('opt_upper').checked) final = final.toUpperCase();
            if (document.getElementById('opt_remove_prices').checked) final = final.replace(/\d{3,}/g, '');
            if (document.getElementById('opt_clean_space').checked) final = final.replace(/ {2,}/g, ' ');

            // Clean up extra slashes & spaces
            final = final.split('/').map(s => s.trim()).filter(s => s !== "" && s !== "=").join(' / ');

            document.getElementById('outputText').value = final.trim();
            saveSettings();
        }

        // --- UI Functions ---
        function renderListRow(mode, from, to = "", checked = true) {
            const container = document.getElementById(mode === 'replace' ? 'replaceInputs' : 'collectionInputs');
            const row = document.createElement('div');
            row.className = 'list-item-row';
            row.innerHTML = `
                <input type="checkbox" class="list-check" ${checked ? 'checked' : ''} onchange="processText()">
                <div class="list-info ${mode === 'replace' ? 'grid-mode' : ''}">
                    <span class="txt-from">${from}</span>
                    ${mode === 'replace' ? `<span>→</span><span class="txt-to">${to || '(ลบ)'}</span>` : ''}
                </div>
                <input type="hidden" class="val-from" value="${from}">
                ${mode === 'replace' ? `<input type="hidden" class="val-to" value="${to}">` : ''}
                <div class="dropdown-container">
                    <button class="option-btn" onclick="toggleDropdown(event, this)">⋮</button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="editRow(this, '${mode}')">Edit</div>
                        <div class="dropdown-item delete" onclick="this.closest('.list-item-row').remove(); processText();">Delete</div>
                    </div>
                </div>
            `;
            container.appendChild(row);
        }

        function toggleDropdown(e, btn) {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            btn.nextElementSibling.classList.toggle('show');
        }

        function bulkAction(type, action) {
            const container = document.getElementById(type === 'collection' ? 'collectionInputs' : 'replaceInputs');
            if (action === 'selectAll') container.querySelectorAll('.list-check').forEach(c => c.checked = true);
            if (action === 'deselectAll') container.querySelectorAll('.list-check').forEach(c => c.checked = false);
            if (action === 'deleteSelected') container.querySelectorAll('.list-item-row').forEach(r => { if(r.querySelector('.list-check').checked) r.remove(); });
            processText();
        }

        function openModal(mode) {
            currentModalMode = mode;
            currentEditingRow = null;
            document.getElementById('modalTitle').innerText = mode === 'replace' ? 'Add Replacement' : 'Add Collection';
            document.getElementById('modalToContainer').style.display = mode === 'replace' ? 'block' : 'none';
            document.getElementById('modalFrom').value = '';
            document.getElementById('modalTo').value = '';
            document.getElementById('generalModal').classList.add('show');
        }

        function editRow(btn, mode) {
            currentEditingRow = btn.closest('.list-item-row');
            currentModalMode = mode;
            document.getElementById('modalTitle').innerText = 'Edit Item';
            document.getElementById('modalToContainer').style.display = mode === 'replace' ? 'block' : 'none';
            document.getElementById('modalFrom').value = currentEditingRow.querySelector('.val-from').value;
            if(mode === 'replace') document.getElementById('modalTo').value = currentEditingRow.querySelector('.val-to').value;
            document.getElementById('generalModal').classList.add('show');
        }

        function closeModal() { document.getElementById('generalModal').classList.remove('show'); }

        function saveModal() {
            const from = document.getElementById('modalFrom').value.trim();
            const to = document.getElementById('modalTo').value.trim();
            if (!from) return;

            if (currentEditingRow) {
                currentEditingRow.querySelector('.val-from').value = from;
                currentEditingRow.querySelector('.txt-from').innerText = from;
                if(currentModalMode === 'replace') {
                    currentEditingRow.querySelector('.val-to').value = to;
                    currentEditingRow.querySelector('.txt-to').innerText = to || '(ลบ)';
                }
            } else {
                renderListRow(currentModalMode, from, to);
            }
            closeModal();
            processText();
        }

        function toggleTheme() {
            const curr = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', curr === 'dark' ? 'light' : 'dark');
        }

        function copyToClipboard() {
            const el = document.getElementById('outputText');
            el.select();
            document.execCommand('copy');
            alert('คัดลอกสำเร็จ!');
        }

        // --- Storage Functions ---
        function saveSettings() {
            const data = {
                replace: Array.from(document.querySelectorAll('#replaceInputs .list-item-row')).map(r => ({f: r.querySelector('.val-from').value, t: r.querySelector('.val-to').value, a: r.querySelector('.list-check').checked})),
                collection: Array.from(document.querySelectorAll('#collectionInputs .list-item-row')).map(r => ({f: r.querySelector('.val-from').value, a: r.querySelector('.list-check').checked})),
                options: {
                    upper: document.getElementById('opt_upper').checked,
                    space: document.getElementById('opt_clean_space').checked,
                    price: document.getElementById('opt_remove_prices').checked
                }
            };
            localStorage.setItem('tt_v97_config', JSON.stringify(data));
        }

        function exportSettings() {
            const data = localStorage.getItem('tt_v97_config');
            navigator.clipboard.writeText(data);
            alert('Exported to clipboard!');
        }

        function importSettings() {
            const val = prompt('Paste configuration here:');
            if (val) {
                localStorage.setItem('tt_v97_config', val);
                location.reload();
            }
        }

        window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('tt_v97_config'));
            if (saved) {
                if(saved.replace) saved.replace.forEach(i => renderListRow('replace', i.f, i.t, i.a));
                if(saved.collection) saved.collection.forEach(i => renderListRow('collection', i.f, '', i.a));
                if(saved.options) {
                    document.getElementById('opt_upper').checked = saved.options.upper;
                    document.getElementById('opt_clean_space').checked = saved.options.space;
                    document.getElementById('opt_remove_prices').checked = saved.options.price;
                }
            }
            processText();
        };
    </script>
</body>
</html>
