<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #121212; color: white; transition: all 0.3s; }
        
        /* เมนูสลับโหมดจำลอง (ให้คุณกดเทสต์) */
        .mode-switcher { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px; border-radius: 30px; display: flex; gap: 10px; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #555;}
        .mode-switcher button { background: #555; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .mode-switcher button:hover { background: #0A84FF; }

        /* พื้นที่จำลองคอลเลคชั่น */
        .mock-collections { display: flex; flex-direction: column; gap: 20px; padding: 80px 20px 150px 20px; }
        .mock-box { height: 200px; background: #1e1e1e; border: 1px solid #333; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 1.2rem; }

        /* ================================================= */
        /* โหมดที่ 1: POS (ใบเสร็จขวามือ) */
        /* ================================================= */
        body.mode-pos { display: flex; overflow: hidden; }
        body.mode-pos .mock-collections { flex: 1; overflow-y: auto; padding-top: 80px; padding-bottom: 20px;}
        .pos-receipt { display: none; width: 350px; background: #1a1a1a; border-left: 1px solid #333; padding: 20px; box-sizing: border-box; flex-direction: column; }
        body.mode-pos .pos-receipt { display: flex; }
        
        /* ================================================= */
        /* โหมดที่ 2: Floating Dock (แท่นลอยด้านล่าง) */
        /* ================================================= */
        .floating-dock { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 40px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); gap: 20px; align-items: center; }
        body.mode-dock .floating-dock { display: flex; }
    </style>
</head>
<body class="mode-pos" id="body-ux">

    <div class="mode-switcher">
        <button onclick="document.getElementById('body-ux').className='mode-pos'">แบบที่ 1: ตู้คิดเงิน (POS)</button>
        <button onclick="document.getElementById('body-ux').className='mode-dock'">แบบที่ 2: แท่นลอย (Dock)</button>
    </div>

    <div class="mock-collections">
        <div class="mock-box">พื้นที่กรอกคอลเลคชั่นที่ 1</div>
        <div class="mock-box">พื้นที่กรอกคอลเลคชั่นที่ 2</div>
        <div class="mock-box">พื้นที่กรอกคอลเลคชั่นที่ 3</div>
        <div class="mock-box">พื้นที่กรอกคอลเลคชั่นที่ 4</div>
    </div>

    <div class="pos-receipt">
        <h3 style="margin-top: 60px;">📄 ใบเสร็จ/สรุปยอด</h3>
        <div style="background:#111; border-radius:8px; height: 100px; margin-bottom: 10px; border:1px solid #333; display:flex; align-items:center; justify-content:center; color:#555;">(ตั้งค่าจัดส่ง)</div>
        <div style="background:#111; border-radius:8px; flex:1; border:1px solid #333; padding: 10px; color:#aaa; font-family: monospace;">
            ลูกค้าสั่งซื้อ:<br>- เสื้อ A x1<br>- เสื้อ B x2<br><br>ยอดรวม: 450 บาท
        </div>
        <button style="background: #0A84FF; color: white; padding: 15px; border: none; border-radius: 12px; margin-top: 20px; font-weight: bold; font-size: 1.1rem; cursor: pointer;">คัดลอกข้อความทั้งหมด</button>
    </div>

    <div class="floating-dock">
        <button style="background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">⚙️</button>
        <div style="color: white; font-size: 1.2rem; font-weight: bold; border-left: 1px solid #555; border-right: 1px solid #555; padding: 0 20px;">
            ยอดรวม: <span style="color: #32D74B;">450 ฿</span>
        </div>
        <button style="background: #0A84FF; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">📋 คัดลอกสรุปยอด</button>
    </div>

</body>
</html>
