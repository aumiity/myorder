<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* แถบเมนูด้านซ้าย: ล็อกติดจอ */
        .sidebar { width: 380px; background: #1e1e1e; border-right: 1px solid #333; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
        
        /* พื้นที่ทำงานหลัก: ไถขึ้นลงได้อย่างอิสระ */
        .main-workspace { flex: 1; padding: 2rem 3rem; overflow-y: auto; background: #0a0a0a; }
        
        .mock-box { background: #2d2d2d; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px dashed #444; }
        .mock-textarea { width: 100%; height: 120px; background: #111; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
        .mock-collection { height: 300px; background: #1e1e1e; border-radius: 16px; margin-bottom: 2rem; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #666; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="margin:0;">⚙️ ตั้งค่า & สรุปยอด</h2>
        <div class="mock-box">ตั้งค่าจัดส่ง / หักมัดจำ</div>
        <div class="mock-box">บัญชีธนาคาร</div>
        <div class="mock-box" style="flex:1;">
            สรุปยอดโอน (อัปเดตเรียลไทม์)
            <div class="mock-textarea"></div>
        </div>
    </aside>

    <main class="main-workspace">
        <h2 style="margin-top:0;">📦 รายการสินค้าทั้งหมด</h2>
        <div class="mock-collection">คอลเลคชั่นที่ 1 (ไถเมาส์ลงดูเลย)</div>
        <div class="mock-collection">คอลเลคชั่นที่ 2</div>
        <div class="mock-collection">คอลเลคชั่นที่ 3</div>
        <div class="mock-collection">คอลเลคชั่นที่ 4</div>
    </main>
</body>
</html>
