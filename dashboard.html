<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UX Prototype - Shop Pay Style</title>
    <style>
        :root {
            /* สีธีมแบบ Shop Pay Dark Mode */
            --bg-left: #000000;
            --bg-right: #111111;
            --border: #333333;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            /* สีปุ่มแบบ Shop Pay (สีม่วงอมฟ้า หรือใช้สีฟ้าเดิมก็ได้) */
            --primary: #5A31F4; 
            --primary-hover: #4524C1;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; color: var(--text-main); 
            display: flex; min-height: 100vh;
        }

        /* ======================================= */
        /* ฝั่งซ้าย: พื้นที่เพิ่มสินค้า (60%) */
        /* ======================================= */
        .left-panel {
            flex: 1.3;
            background-color: var(--bg-left);
            padding: 40px 10%;
            overflow-y: auto;
        }

        .header-logo { font-size: 1.5rem; font-weight: bold; margin-bottom: 40px; display: flex; align-items: center; gap: 10px;}

        /* ดีไซน์ Input แบบ Shop Pay (เรียบ ขอบบาง) */
        .mock-input {
            width: 100%; background: transparent; border: 1px solid var(--border);
            padding: 15px; border-radius: 8px; color: white; font-size: 1rem;
            box-sizing: border-box; margin-bottom: 15px;
        }

        .mock-collection {
            margin-bottom: 40px;
        }

        .product-row {
            display: flex; gap: 10px; margin-bottom: 15px;
        }

        .product-row .mock-input { margin-bottom: 0; }

        /* ======================================= */
        /* ฝั่งขวา: สรุปยอด (40%) Sticky */
        /* ======================================= */
        .right-panel {
            flex: 0.8;
            background-color: var(--bg-right);
            border-left: 1px solid var(--border);
            padding: 40px 5%;
            position: relative;
        }

        /* กล่องให้ฝั่งขวาล็อกติดหน้าจอเวลา Scroll */
        .sticky-summary {
            position: sticky;
            top: 40px;
        }

        /* รายการในบิล */
        .summary-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }

        /* ปุ่มหลักขนาดใหญ่แบบ Shopify */
        .btn-pay {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; margin-top: 30px; transition: 0.2s;
        }
        .btn-pay:hover { background: var(--primary-hover); }

        /* ======================================= */
        /* Mobile Layout (สไตล์มือถือ Shopify) */
        /* ======================================= */
        .mobile-summary-toggle { display: none; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            
            .left-panel { padding: 20px; order: 2; flex: none; overflow-y: visible;}
            .right-panel { padding: 0; order: 1; border-left: none; border-bottom: 1px solid var(--border); flex: none; }

            /* ปุ่มกดกาง/หุบ สรุปยอดบนมือถือ */
            .mobile-summary-toggle {
                display: flex; justify-content: space-between; align-items: center;
                background-color: var(--bg-right); padding: 20px; cursor: pointer;
                color: var(--primary); font-weight: bold;
            }

            .sticky-summary { position: static; padding: 20px; display: none; }
            .sticky-summary.show { display: block; } /* โชว์เมื่อกดกางบนมือถือ */
        }
    </style>
</head>
<body>

    <aside class="right-panel">
        <div class="mobile-summary-toggle" onclick="toggleMobileSummary()">
            <span id="toggle-text">🛒 แสดงสรุปยอดโอน (ดูบิล) ▾</span>
            <span style="color: white; font-size: 1.2rem;">฿450.00</span>
        </div>

        <div class="sticky-summary" id="summary-box">
            <h3 style="margin-top:0;">สรุปยอดโอน</h3>
            
            <div class="summary-item">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="width: 50px; height: 50px; background: #222; border-radius: 8px; border: 1px solid #444;"></div>
                    <span>เสื้อลายดอก (M) x1</span>
                </div>
                <span>฿200.00</span>
            </div>
            <div class="summary-item">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="width: 50px; height: 50px; background: #222; border-radius: 8px; border: 1px solid #444;"></div>
                    <span>กางเกงยีนส์ (L) x1</span>
                </div>
                <span>฿200.00</span>
            </div>

            <div class="summary-item" style="border-bottom: none; margin-top: 15px;">
                <span style="color: var(--text-muted);">ค่าจัดส่ง</span>
                <span>฿50.00</span>
            </div>
            
            <div class="summary-item" style="border-bottom: none; font-size: 1.5rem; font-weight: bold;">
                <span>รวมทั้งหมด</span>
                <span>฿450.00</span>
            </div>

            <button class="btn-pay">📋 คัดลอกข้อความสรุปยอด</button>
        </div>
    </aside>

    <main class="left-panel">
        <div class="header-logo">
            🛍️ Order Management
        </div>

        <h2 style="margin-bottom: 20px;">ข้อมูลสินค้า (คอลเลคชั่นที่ 1)</h2>
        
        <div class="mock-collection">
            <input type="text" class="mock-input" placeholder="ชื่อคอลเลคชั่น (เช่น เสื้อลายดอก)">
            
            <div class="product-row">
                <input type="text" class="mock-input" style="flex:2;" placeholder="ชื่อสินค้า">
                <input type="text" class="mock-input" style="flex:1;" placeholder="ราคา">
                <input type="text" class="mock-input" style="flex:1;" placeholder="จำนวน">
            </div>
            
            <button style="background:transparent; color: var(--primary); border:none; cursor:pointer; font-weight:bold;">+ เพิ่มสินค้าใหม่</button>
        </div>

        <h2 style="margin-bottom: 20px; margin-top: 40px;">การตั้งค่าจัดส่ง & ธนาคาร</h2>
        <input type="text" class="mock-input" placeholder="ค่าจัดส่ง (เช่น 50)">
        <input type="text" class="mock-input" placeholder="หักมัดจำ">
        
        <select class="mock-input" style="appearance: auto;">
            <option>กสิกรไทย - 123456789</option>
            <option>ไทยพาณิชย์ - 987654321</option>
        </select>

    </main>

    <script>
        // ฟังก์ชันกาง/หุบ บิลสรุปยอดสำหรับจอมือถือ
        function toggleMobileSummary() {
            const summaryBox = document.getElementById('summary-box');
            const toggleText = document.getElementById('toggle-text');
            summaryBox.classList.toggle('show');
            
            if(summaryBox.classList.contains('show')) {
                toggleText.innerText = "🛒 ซ่อนสรุปยอดโอน ▴";
            } else {
                toggleText.innerText = "🛒 แสดงสรุปยอดโอน (ดูบิล) ▾";
            }
        }
    </script>
</body>
</html>
