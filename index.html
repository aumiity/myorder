<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myorder</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --border: #D1D5DB; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 3rem; 
            display: flex;
            justify-content: center;
        }
        .container {
            display: grid;
            grid-template-columns: 1.4fr 1fr; 
            gap: 2.5rem; 
            max-width: 1500px; 
            width: 100%;
        }
        .panel {
            background: var(--surface);
            padding: 2rem; 
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h2 { margin: 0; color: var(--primary); font-size: 1.8rem; display: flex; align-items: baseline; gap: 0.5rem; }
        .version-badge { font-size: 0.9rem; color: #9CA3AF; font-weight: normal; }
        
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1.05rem; 
        }
        
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1.05rem; 
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        
        .collection-block {
            background-color: #F8FAFC;
            border: 2px dashed #CBD5E1;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        
        /* --- ดีไซน์หัวข้อคอลเลคชั่น (เพิ่มปุ่มยุบ/ขยาย) --- */
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #CBD5E1;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }
        .btn-toggle-col {
            background: #E5E7EB;
            color: #4B5563;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .btn-toggle-col:hover { background: #D1D5DB; }
        
        /* สไตล์ตอนคอลเลคชั่นถูกยุบไว้ */
        .collection-block.collapsed .collection-header {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .collection-block.collapsed .collection-body {
            display: none;
        }
        
        .product-item {
            background: #FFFFFF;
            padding: 0.6rem 0.75rem; 
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 0.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: nowrap; 
        }

        .product-item input[type="text"], .product-item input[type="number"] {
            padding: 0.5rem;
            font-size: 1rem;
        }
        .productName { width: 180px; flex-shrink: 1; }
        .productPrice { width: 80px; flex-shrink: 0; }
        .productQty { width: 65px; flex-shrink: 0; text-align: center; }
        
        .size-pills {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.35rem;
            align-items: center;
            margin-left: 0.5rem;
            margin-right: auto; 
        }
        
        .pill {
            padding: 0.35rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: #F3F4F6;
            color: #4B5563;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            white-space: nowrap; 
        }
        .pill:hover { border-color: #9CA3AF; background: #E5E7EB; }
        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        .pill-custom {
            border-style: dashed;
            background: transparent;
            color: var(--primary);
            border-color: var(--primary);
        }
        .pill-custom:hover { background: #EEF2FF; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s;
        }
        .btn:hover, .btn:active { background-color: var(--primary-hover); }
        
        .btn-icon {
            padding: 0;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .btn-clone { background-color: #3B82F6; }
        .btn-clone:hover, .btn-clone:active { background-color: #2563EB; }
        .btn-remove { background-color: #EF4444; }
        .btn-remove:hover, .btn-remove:active { background-color: #DC2626; }
        
        .btn-remove-col {
            background-color: transparent;
            color: #EF4444;
            border: 1px solid #EF4444;
            padding: 0.4rem 0.85rem;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-remove-col:hover { background-color: #FEF2F2; color: #DC2626; }

        .btn-clear-all-sizes {
            background-color: #4B5563;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-clear-all-sizes:hover { background-color: #374151; }
        
        .radio-group {
            display: flex;
            flex-direction: row; 
            gap: 1rem;
        }
        .radio-group label {
            display: flex;
            align-items: flex-start;
            font-weight: normal;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.85rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            flex: 1; 
            font-size: 1rem;
        }
        input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
        }
        textarea {
            height: 350px; 
            resize: vertical;
            background-color: #F9FAFB;
            line-height: 1.6;
        }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
            .product-item { flex-wrap: wrap; }
            .productName { width: 100%; flex: 1 1 100%; }
            .productPrice { flex: 1 1 40%; }
            .productQty { flex: 1 1 30%; }
            .size-pills { flex-wrap: wrap; margin-left: 0; width: 100%; }
            .collection-header { flex-wrap: wrap; }
            .header-left { width: 100%; flex: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="main-header">
            <h2>📝 ข้อมูลออเดอร์ <span class="version-badge">v3.3</span></h2>
            <button class="btn-clear-all-sizes" onclick="clearAllPills()">↺ ล้างไซส์ทั้งหมด</button>
        </div>
        
        <div id="collectionsContainer">
            </div>

        <button class="btn" style="width: 100%; background-color: #F59E0B; color: white; margin-bottom: 2rem;" onclick="addCollectionBlock()">+ เพิ่มคอลเลคชั่นใหม่</button>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 2rem;">

        <div class="form-group">
            <label>ค่าส่ง (บาท)</label>
            <input type="number" id="shippingCost" placeholder="เช่น 50" value="0">
        </div>

        <div class="form-group">
            <label>บัญชีธนาคาร</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="bank" value="TTB" checked> 
                    <span>ธ.ไทยธนชาต TTB<br>622-2-84950-4<br>กุลจิรา ล้อพงศ์ไพบูลย์</span>
                </label>
                <label>
                    <input type="radio" name="bank" value="SCB"> 
                    <span>ธ.ไทยพาณิชย์ SCB<br>407-811653-8<br>กุลจิรา ตู้จินดา</span>
                </label>
                <label>
                    <input type="radio" name="bank" value="KBANK"> 
                    <span>ธ.กสิกร KBANK<br>026-1-56003-8<br>กุลจิรา ตู้จินดา</span>
                </label>
            </div>
        </div>

        <button class="btn" style="width: 100%; background-color: #EF4444; margin-top: 1.5rem;" onclick="clearData()">🗑️ ล้างข้อมูลทั้งหมด (ลบรายการสินค้าทิ้ง)</button>
        
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button class="btn" style="flex: 1; background-color: #8B5CF6;" onclick="exportData()">📤 ส่งออกข้อมูล</button>
            <button class="btn" style="flex: 1; background-color: #14B8A6;" onclick="importData()">📥 นำเข้าข้อมูล</button>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin-bottom: 1.5rem;">📋 ข้อความสรุปยอดโอน</h2>
        <div class="form-group">
            <textarea id="outputText" readonly placeholder="ข้อความสรุปยอดจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn" style="width: 100%; background-color: #3B82F6; margin-bottom: 3rem;" onclick="copyText('outputText')">📄 คัดลอกสรุปยอด</button>

        <h2 style="margin-bottom: 1.5rem;">📦 ข้อความใบปะหน้า</h2>
        <div class="form-group">
            <textarea id="outputLabelText" readonly placeholder="ข้อความสำหรับใบปะหน้าจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn" style="width: 100%; background-color: #10B981;" onclick="copyText('outputLabelText')">📄 คัดลอกใบปะหน้า</button>
    </div>
</div>

<script>
    window.onload = function() {
        loadData();
        
        const updateData = () => { saveData(); generateText(); };
        
        document.getElementById('shippingCost').addEventListener('input', updateData);
        document.querySelectorAll('input[name="bank"]').forEach(radio => radio.addEventListener('change', updateData));
        document.getElementById('collectionsContainer').addEventListener('input', updateData);
        
        generateText(); 
    };

    function saveData() {
        localStorage.setItem('shippingCost', document.getElementById('shippingCost').value);
        localStorage.setItem('bank', document.querySelector('input[name="bank"]:checked').value);

        const collections = [];
        document.querySelectorAll('.collection-block').forEach(block => {
            const colName = block.querySelector('.collectionName').value;
            // บันทึกสถานะว่าคอลเลคชั่นนี้ถูกยุบไว้หรือไม่
            const isCollapsed = block.classList.contains('collapsed');
            const products = [];
            
            block.querySelectorAll('.product-item').forEach(item => {
                const name = item.querySelector('.productName').value;
                const price = item.querySelector('.productPrice').value;
                const qty = item.querySelector('.productQty').value;
                const selectedSizes = [];
                
                item.querySelectorAll('.pill.active').forEach(pill => {
                    selectedSizes.push(pill.getAttribute('data-size'));
                });
                
                products.push({ name, price, qty, selectedSizes });
            });
            collections.push({ colName, isCollapsed, products });
        });
        localStorage.setItem('orderDataV2', JSON.stringify(collections));
    }

    function loadData() {
        if (localStorage.getItem('shippingCost')) document.getElementById('shippingCost').value = localStorage.getItem('shippingCost');
        
        if (localStorage.getItem('bank')) {
            const bankVal = localStorage.getItem('bank');
            const bankInput = document.querySelector(`input[name="bank"][value="${bankVal}"]`);
            if(bankInput) bankInput.checked = true;
        }

        const container = document.getElementById('collectionsContainer');
        container.innerHTML = ''; 

        const savedDataV2 = JSON.parse(localStorage.getItem('orderDataV2'));

        if (savedDataV2 && savedDataV2.length > 0) {
            savedDataV2.forEach(col => {
                const block = addCollectionBlock(col.colName, col.isCollapsed);
                if(col.products.length > 0) {
                    col.products.forEach(p => {
                        const productList = block.querySelector('.productList');
                        productList.appendChild(createProductItemElement(p.name, p.price, p.selectedSizes, p.qty));
                    });
                } else {
                    const productList = block.querySelector('.productList');
                    productList.appendChild(createProductItemElement('', '', [], 1)); 
                }
            });
        } else {
            const block = addCollectionBlock('');
            const productList = block.querySelector('.productList');
            productList.appendChild(createProductItemElement('', '', [], 1));
        }
    }

    function exportData() {
        saveData();
        const data = localStorage.getItem('orderDataV2');
        if (!data || data === '[]') {
            alert('ยังไม่มีข้อมูลสินค้าให้ส่งออกครับ');
            return;
        }
        const encodedData = btoa(encodeURIComponent(data));
        navigator.clipboard.writeText(encodedData).then(() => {
            alert('📋 คัดลอก "โค้ดข้อมูลร้าน" เรียบร้อยแล้ว!\n\nเอาโค้ดนี้ไปส่งเข้า LINE แล้วเอาไปกด "นำเข้าข้อมูล" ในเครื่องอื่นได้เลยครับ');
        }).catch(err => {
            prompt('คัดลอกโค้ดด้านล่างนี้ ไปวางในเครื่องอื่น:', encodedData);
        });
    }

    function importData() {
        const code = prompt('📥 วาง "โค้ดข้อมูลร้าน" ที่คัดลอกมา ลงในช่องนี้:');
        if (!code) return;
        try {
            const decodedData = decodeURIComponent(atob(code));
            JSON.parse(decodedData); 
            if(confirm('🚨 การนำเข้า จะ "เขียนทับ" รายการสินค้าที่มีอยู่บนหน้าจอตอนนี้ทั้งหมด\nคุณแน่ใจหรือไม่?')) {
                localStorage.setItem('orderDataV2', decodedData);
                loadData();
                generateText();
                alert('✅ นำเข้าข้อมูลเรียบร้อย! รายการสินค้ามาครบแล้วครับ');
            }
        } catch(e) {
            alert('❌ โค้ดไม่ถูกต้อง หรือข้อมูลไม่สมบูรณ์ครับ กรุณาก๊อปปี้มาใหม่');
        }
    }

    // เพิ่มฟังก์ชันสำหรับสลับการยุบ/ขยาย
    function toggleCollection(btn) {
        const block = btn.closest('.collection-block');
        block.classList.toggle('collapsed');
        
        if (block.classList.contains('collapsed')) {
            btn.innerHTML = '▶'; // สัญลักษณ์ตอนโดนยุบ
            btn.title = 'คลิกเพื่อขยาย';
        } else {
            btn.innerHTML = '▼'; // สัญลักษณ์ตอนขยาย
            btn.title = 'คลิกเพื่อยุบ';
        }
        saveData(); // จำสถานะการยุบ/ขยายเอาไว้ด้วย
    }

    function addCollectionBlock(colName = '', isCollapsed = false) {
        const container = document.getElementById('collectionsContainer');
        const block = document.createElement('div');
        block.className = 'collection-block';
        if(isCollapsed) block.classList.add('collapsed');
        
        const icon = isCollapsed ? '▶' : '▼';
        
        block.innerHTML = `
            <div class="collection-header">
                <div class="header-left">
                    <button class="btn-toggle-col" onclick="toggleCollection(this)" title="คลิกเพื่อยุบ/ขยาย">${icon}</button>
                    <input type="text" class="collectionName" placeholder="ชื่อคอลเลคชั่น เช่น Summer 2026" value="${colName}" style="margin: 0; padding: 0.6rem 1rem;">
                </div>
                <button class="btn btn-remove-col" onclick="removeCollectionBlock(this)">ลบชุดนี้</button>
            </div>
            
            <div class="collection-body">
                <label style="margin-bottom: 0.75rem;">รายการสินค้า <small style="color: #6B7280; font-weight: normal;">(พิมพ์ชื่อ 1 แถว จิ้มไซส์ได้หลายปุ่มเลย)</small></label>
                <div class="productList"></div>
                <button class="btn" style="margin-top: 0.5rem; width: 100%; background-color: #10B981; padding: 0.6rem; font-size: 1rem;" onclick="handleAddProductClick(this)">+ เพิ่มสินค้าบรรทัดใหม่</button>
            </div>
        `;
        container.appendChild(block);
        
        if(colName === '' && arguments.length === 0) {
            const productList = block.querySelector('.productList');
            productList.appendChild(createProductItemElement('', '', [], 1));
            saveData();
            generateText();
        }
        return block;
    }

    function removeCollectionBlock(btn) {
        if(confirm('ต้องการลบคอลเลคชั่นนี้พร้อมสินค้าทั้งหมดในนี้ใช่ไหม?')) {
            btn.closest('.collection-block').remove();
            saveData();
            generateText();
        }
    }

    function clearAllPills() {
        const activePills = document.querySelectorAll('.pill.active');
        activePills.forEach(pill => {
            pill.classList.remove('active');
        });
        document.querySelectorAll('.productQty').forEach(qtyInput => {
            qtyInput.value = 1;
        });
        saveData();
        generateText();
    }

    function handleAddProductClick(btn) {
        const block = btn.closest('.collection-block');
        const productList = block.querySelector('.productList');
        productList.appendChild(createProductItemElement('', '', [], 1));
        saveData();
        generateText();
    }

    function createProductItemElement(name = '', price = '', selectedSizes = [], qty = 1) {
        const newItem = document.createElement('div');
        newItem.className = 'product-item';
        
        const defaultSizes = ['-', 'S', 'M', 'L', 'XL', '2XL', '3XL', '4XL'];
        const allSizes = [...new Set([...defaultSizes, ...selectedSizes])]; 

        let pillsHtml = '';
        allSizes.forEach(s => {
            const isActive = selectedSizes.includes(s) ? 'active' : '';
            const displayTxt = s === '-' ? 'ไม่มีไซส์' : s;
            pillsHtml += `<div class="pill ${isActive}" onclick="togglePill(this)" data-size="${s}">${displayTxt}</div>`;
        });

        newItem.innerHTML = `
            <input type="text" class="productName" placeholder="ชื่อสินค้า" value="${name}">
            <input type="number" class="productPrice" placeholder="ราคา" value="${price}">
            <input type="number" class="productQty" placeholder="จำนวน" title="จำนวนชิ้น (ต่อ 1 ไซส์)" value="${qty || 1}" min="1">
            <div class="size-pills">
                ${pillsHtml}
                <div class="pill pill-custom" onclick="addCustomPill(this)">+ พิมพ์เอง</div>
            </div>
            <button class="btn btn-icon btn-clone" title="คัดลอกสินค้านี้เพื่อตั้งราคา/จำนวนใหม่" onclick="cloneProduct(this)">📄</button>
            <button class="btn btn-icon btn-remove" title="ลบรายการ" onclick="removeProduct(this)">-</button>
        `;
        return newItem;
    }

    function cloneProduct(btn) {
        const currentItem = btn.closest('.product-item');
        const name = currentItem.querySelector('.productName').value;
        const price = currentItem.querySelector('.productPrice').value;
        const newItem = createProductItemElement(name, price, [], 1);
        currentItem.parentNode.insertBefore(newItem, currentItem.nextSibling);
        saveData();
        generateText();
    }

    function togglePill(pill) {
        pill.classList.toggle('active');
        saveData();
        generateText();
    }

    function addCustomPill(btn) {
        const newSize = prompt('กรอกไซส์ที่ต้องการ (เช่น 40, 42):');
        if (newSize && newSize.trim() !== '') {
            const sizeVal = newSize.trim();
            const newPill = document.createElement('div');
            newPill.className = 'pill active';
            newPill.setAttribute('data-size', sizeVal);
            newPill.innerText = sizeVal;
            newPill.onclick = function() { togglePill(this); };

            btn.parentNode.insertBefore(newPill, btn);
            saveData();
            generateText();
        }
    }

    function removeProduct(btn) {
        btn.closest('.product-item').remove();
        saveData(); 
        generateText(); 
    }

    function clearData() {
        if(confirm('คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลทั้งหมด (ลบรายการสินค้าทิ้งทั้งหมด) เพื่อเริ่มใหม่? \n*ถ้าอยากเคลียร์แค่ไซส์ ให้กด "ล้างไซส์ทั้งหมด" ด้านบนแทนครับ*')) {
            localStorage.clear();

            document.getElementById('shippingCost').value = '0';
            document.getElementById('outputText').value = '';
            document.getElementById('outputLabelText').value = '';
            document.querySelector('input[name="bank"][value="TTB"]').checked = true;

            const container = document.getElementById('collectionsContainer');
            container.innerHTML = ''; 
            
            const block = addCollectionBlock('');
            
            saveData();
            generateText();
        }
    }

    function generateText() {
        const shipping = document.getElementById('shippingCost').value || '0';
        const shippingValue = parseFloat(shipping) || 0;
        
        let finalProductsText = '';
        let labelLines = []; 
        let validPrices = [];
        let hasMissingPrice = false;
        let productsSum = 0;
        
        const blocks = document.querySelectorAll('.collection-block');
        blocks.forEach(block => {
            const colName = block.querySelector('.collectionName').value.trim();
            const productItems = block.querySelectorAll('.product-item');
            
            let colText = '';
            let colLabelProducts = []; 
            
            let mergedProductsMap = {};
            let mergedProductsOrder = [];
            
            productItems.forEach(item => {
                const nameVal = item.querySelector('.productName').value.trim();
                const rawPrice = item.querySelector('.productPrice').value.trim();
                const rawQty = item.querySelector('.productQty').value.trim();
                
                const qtyVal = parseInt(rawQty) || 1; 

                const activePills = item.querySelectorAll('.pill.active');

                if (nameVal !== '' && activePills.length > 0) {
                    if (!mergedProductsMap[nameVal]) {
                        mergedProductsMap[nameVal] = [];
                        mergedProductsOrder.push(nameVal);
                    }

                    activePills.forEach(pill => {
                        const sizeVal = pill.getAttribute('data-size');
                        const sizeText = (sizeVal === '-' || sizeVal === '') ? '' : `(${sizeVal})`;
                        
                        let token = '';
                        if (sizeText !== '') {
                            token = sizeText + (qtyVal > 1 ? `x${qtyVal}` : '');
                        } else if (qtyVal > 1) {
                            token = `x${qtyVal}`;
                        }
                        
                        if (token !== '') {
                            mergedProductsMap[nameVal].push(token);
                        }

                        if (rawPrice === '') {
                            validPrices.push('***');
                            hasMissingPrice = true;
                        } else {
                            const priceVal = parseFloat(rawPrice);
                            if (priceVal > 0) {
                                if (qtyVal > 1) {
                                    validPrices.push(`${priceVal}x${qtyVal}`);
                                } else {
                                    validPrices.push(priceVal);
                                }
                                productsSum += (priceVal * qtyVal);
                            }
                        }
                    });
                }
            });

            mergedProductsOrder.forEach(name => {
                const sizesArr = mergedProductsMap[name];
                if (sizesArr.length > 0) {
                    colText += `- ${name} ${sizesArr.join(',')}\n`;
                    colLabelProducts.push(`${name} ${sizesArr.join(',')}`);
                } else {
                    colText += `- ${name}\n`;
                    colLabelProducts.push(`${name}`);
                }
            });

            if (colText !== '') {
                if (colName !== '') {
                    finalProductsText += `${colName}\n${colText}\n`;
                } else {
                    finalProductsText += `${colText}\n`;
                }
            }

            if (colLabelProducts.length > 0) {
                if (colName !== '') {
                    labelLines.push(`${colName} = ${colLabelProducts.join(' / ')}`);
                } else {
                    labelLines.push(colLabelProducts.join(' / '));
                }
            }
        });
        
        if (finalProductsText === '') {
            finalProductsText = '- ไม่มีรายการสินค้า -\n\n';
        }

        let priceString = '';
        if (validPrices.length > 0) {
            const totalSum = hasMissingPrice ? '***' : (productsSum + shippingValue); 
            if (shippingValue > 0) {
                priceString = `${validPrices.join(' + ')} + ${shippingValue} = ${totalSum}`;
            } else {
                priceString = `${validPrices.join(' + ')} = ${totalSum}`;
            }
        } else {
            if (hasMissingPrice) {
                 const totalSum = '***';
                 if (shippingValue > 0) {
                     priceString = `*** + ${shippingValue} = ${totalSum}`;
                 } else {
                     priceString = `*** = ***`;
                 }
            } else {
                if (shippingValue > 0) {
                    priceString = `${shippingValue} = ${shippingValue}`;
                } else {
                    priceString = '0 = 0';
                }
            }
        }

        const bankRadios = document.getElementsByName('bank');
        let bankText = '';
        for (const radio of bankRadios) {
            if (radio.checked) {
                if (radio.value === 'TTB') bankText = "ธ.ไทยธนชาต TTB\n622-2-84950-4\nกุลจิรา ล้อพงศ์ไพบูลย์";
                else if (radio.value === 'SCB') bankText = "ธ.ไทยพาณิชย์ SCB\n407-811653-8\nกุลจิรา ตู้จินดา";
                else if (radio.value === 'KBANK') bankText = "ธ.กสิกร KBANK\n026-1-56003-8\nกุลจิรา ตู้จินดา";
            }
        }

        const finalOutput = `${finalProductsText}ค่าจัดส่ง: ${shipping} บาท
ยอดรวม: ${priceString} บาท

--------------------------
ชำระเงินได้ที่:
${bankText}

โอนเงินแล้วกรุณาส่งสลิป และที่อยู่ให้ด้วยนะคะ`;
        document.getElementById('outputText').value = finalOutput;
        document.getElementById('outputLabelText').value = labelLines.join('\n');
    }

    function copyText(elementId) {
        const outputArea = document.getElementById(elementId);
        if(outputArea.value.trim() === '') return;
        outputArea.select();
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
    }
</script>
