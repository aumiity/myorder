<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myorder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="main-header">
            <h2>
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--theme-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                ออเดอร์ <span class="version-badge">v6.9 (Dynamic Bank)</span>
            </h2>
            <button class="btn btn-danger-outline" style="padding: 0.55rem 1rem; font-size: 0.95rem;" onclick="clearAllPills()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                ล้างตัวเลือก
            </button>
        </div>
        
        <div id="collectionsContainer"></div>

        <button class="btn btn-primary" style="width: 100%; margin-bottom: 2rem;" onclick="addCollectionBlock()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            เพิ่มคอลเลคชั่นใหม่
        </button>
        
        <div class="form-group">
            <label>ค่าจัดส่ง (บาท)</label>
            <input type="number" id="shippingCost" placeholder="เช่น 50" value="0">
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem;">
                <label style="margin: 0;">บัญชีธนาคาร</label>
                <button class="btn-add-row" onclick="addBank()" style="margin: 0; font-size: 0.9rem;">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    เพิ่มบัญชี
                </button>
            </div>
            <div class="radio-group" id="bankContainer">
                </div>
        </div>

        <button class="btn btn-danger-outline" style="width: 100%; margin-top: 1.5rem;" onclick="clearData()">
            ล้างข้อมูลสินค้าทั้งหมด
        </button>
        
        <div class="action-buttons-group">
            <button class="btn" style="flex: 1;" onclick="exportData()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                ส่งออก
            </button>
            <button class="btn" style="flex: 1;" onclick="importData()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                นำเข้า
            </button>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin-bottom: 1.5rem; font-size: 1.3rem;">สรุปยอดโอน</h2>
        <div class="form-group">
            <textarea id="outputText" readonly placeholder="ข้อความสรุปยอดจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 3rem;" onclick="copyText('outputText')">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            คัดลอกสรุปยอด
        </button>

        <h2 style="margin-bottom: 1.5rem; font-size: 1.3rem;">ใบปะหน้า</h2>
        <div class="form-group">
            <textarea id="outputLabelText" readonly placeholder="ข้อความสำหรับใบปะหน้าจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn btn-success" style="width: 100%;" onclick="copyText('outputLabelText')">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            คัดลอกใบปะหน้า
        </button>
    </div>
</div>

<div class="help-section">
    <button class="help-toggle" onclick="toggleHelp()">
        <span>📖 คู่มือการใช้งานระบบ (คลิกเพื่อเปิดอ่าน)</span>
        <span id="help-icon" style="transition: transform 0.3s;">▼</span>
    </button>
    <div class="help-content" id="helpContent">
        <div id="helpLoading" style="display: none; text-align: center; padding: 2rem; color: var(--theme-text-muted);">
            ⏳ กำลังโหลดข้อมูล...
        </div>
        <div id="helpInner"></div>
    </div>
</div>

<div class="app-footer">
    <label for="themeSelector">🎨 เลือกธีม:</label>
    <select id="themeSelector" onchange="changeTheme()">
        <option value="ios">iOS Dark</option>
        <option value="github">GitHub Dark</option>
    </select>
</div>

<script src="script.js"></script>
</body>
</html>
