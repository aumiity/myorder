<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myorder</title>
    <style>
        /* ========================================= */
        /* --- 1. ระบบจัดการ THEME (สีหลักของเว็บ) --- */
        /* ========================================= */
        
        :root {
            --theme-bg: #000000; --theme-surface: #1C1C1E; --theme-surface-alt: #2C2C2E; --theme-surface-hover: #3A3A3C;
            --theme-primary: #0A84FF; --theme-primary-hover: #007AFF; --theme-primary-alpha: rgba(10, 132, 255, 0.15); 
            --theme-accent-text: #64D2FF; --theme-danger: #FF453A; --theme-danger-hover: #FF3B30; 
            --theme-success: #32D74B; --theme-warning: #FFD60A; --theme-text: #FFFFFF; --theme-text-muted: #8E8E93; --theme-border: #38383A;
        }

        [data-theme="github"] {
            --theme-bg: #0d1117; --theme-surface: #161b22; --theme-surface-alt: #21262d; --theme-surface-hover: #30363d;
            --theme-primary: #2f81f7; --theme-primary-hover: #388bfd; --theme-primary-alpha: rgba(47, 129, 247, 0.15); 
            --theme-accent-text: #79c0ff; --theme-danger: #f85149; --theme-danger-hover: #ff7b72; 
            --theme-success: #238636; --theme-warning: #d29922; --theme-text: #c9d1d9; --theme-text-muted: #8b949e; --theme-border: #30363d;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--theme-bg); color: var(--theme-text); margin: 0; padding: 2rem 3rem; display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s ease, color 0.3s ease; }
        .container { display: grid; grid-template-columns: 1.4fr 1fr; gap: 2rem; width: 100%; max-width: 1800px; }
        .panel { background: var(--theme-surface); padding: 2rem; border-radius: 20px; border: 1px solid var(--theme-border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); transition: background-color 0.3s ease, border-color 0.3s ease; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--theme-border); }
        h2 { margin: 0; color: var(--theme-text); font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 0.75rem; }
        .version-badge { font-size: 0.85rem; color: var(--theme-text-muted); font-weight: normal; }
        .form-group { margin-bottom: 1.5rem; }
        label.section-label { display: block; margin-bottom: 0.8rem; font-weight: 600; font-size: 1.05rem; color: var(--theme-text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 0.85rem 1rem; background-color: var(--theme-surface-alt); color: var(--theme-text); border: 2px solid transparent; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 16px; -webkit-appearance: none; appearance: none; transition: all 0.2s ease; }
        input::placeholder, textarea::placeholder { color: var(--theme-text-muted); }
        input:focus, textarea:focus { outline: none; border-color: var(--theme-primary); background-color: var(--theme-surface-hover); }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        .collection-block { background-color: var(--theme-bg); border-radius: 16px; padding: 1.25rem; margin-bottom: 1.5rem; border: 1px solid var(--theme-border); transition: all 0.3s ease; }
        .collection-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .header-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
        .header-actions { display: flex; gap: 0.4rem; align-items: center; }
        .btn-toggle-col { background: transparent; color: var(--theme-primary); border: none; width: 36px; height: 36px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
        .btn-toggle-col:hover { opacity: 0.7; }
        .collection-block.collapsed .collection-header { margin-bottom: 0; }
        .collection-block.collapsed .collection-body { display: none; }
        
        .product-item { background: var(--theme-surface); padding: 1rem; border-radius: 12px; margin-bottom: 0.75rem; border: 1px solid var(--theme-border); }
        .product-header-row { display: grid; grid-template-columns: 1fr 85px 65px auto; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
        .product-header-row input { padding: 0.6rem; font-size: 0.95rem; }
        .productName { width: 100%; font-weight: 500; }
        .productPrice, .productQty { width: 100%; text-align: center; background-color: var(--theme-primary-alpha); color: var(--theme-accent-text); font-weight: 600; border: 1px solid transparent; }
        .productPrice:focus, .productQty:focus { border-color: var(--theme-primary); }
        .product-actions { display: flex; gap: 0.3rem; }
        
        .option-row { display: flex; align-items: center; margin-bottom: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--theme-border); }
        .size-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; width: 100%; }
        .pill { padding: 0.4rem 0.9rem; border-radius: 20px; background: var(--theme-surface-alt); color: var(--theme-text); font-size: 0.9rem; font-weight: 500; cursor: pointer; user-select: none; transition: all 0.2s ease; border: 1px solid transparent; }
        .pill:hover { background: var(--theme-surface-hover); }
        .pill.active { background: var(--theme-primary); color: white; border-color: var(--theme-primary-hover); }
        .pill-action { appearance: none; -webkit-appearance: none; background: transparent; border: none; padding: 0; cursor: pointer; color: inherit; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.3rem; padding: 0.4rem 0.85rem; border-radius: 20px; color: var(--theme-primary); border: 1px solid transparent; transition: all 0.2s ease; }
        .pill-action:hover { background: var(--theme-primary-alpha); }

        .btn { background-color: var(--theme-surface-alt); color: var(--theme-text); border: 1px solid var(--theme-border); padding: 1rem 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
        .btn:hover, .btn:active { background-color: var(--theme-surface-hover); }
        .btn-primary { background-color: var(--theme-primary); color: white; border: none; }
        .btn-primary:hover, .btn-primary:active { background-color: var(--theme-primary-hover); }
        .btn-success { background-color: var(--theme-success); color: white; border: none; }
        .btn-danger-outline { background-color: transparent; color: var(--theme-danger); border: 1px solid var(--theme-danger); }
        .btn-danger-outline:hover { background-color: var(--theme-danger-alpha); }
        
        .btn-icon { padding: 0; width: 34px; height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: white; border: none; cursor: pointer; transition: opacity 0.2s; }
        .btn-icon:hover { opacity: 0.8; }
        .btn-move { background-color: var(--theme-surface-hover); color: var(--theme-text); }
        .btn-clone { background-color: var(--theme-primary); }
        .btn-remove { background-color: var(--theme-danger); }
        .btn-add-row { background: transparent; color: var(--theme-primary); border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; padding: 0.5rem 0; margin-top: 0.25rem; display: flex; align-items: center; gap: 0.3rem; }
        .btn-add-row:hover { opacity: 0.7; text-decoration: underline; }

        /* ========================================= */
        /* --- ระบบ iOS INSET GROUPED LIST (ดีไซน์ใหม่) --- */
        /* ========================================= */
        .ios-list-group {
            background-color: var(--theme-bg);
            border: 1px solid var(--theme-border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ios-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            background-color: transparent;
            transition: background-color 0.2s;
            position: relative;
        }
        
        /* เส้นคั่นระหว่างรายการ (ไม่ลากสุดขอบซ้าย แบบ iOS) */
        .ios-list-item:not(:last-child)::after {
            content: ''; position: absolute; bottom: 0; left: 3.5rem; right: 0;
            height: 1px; background-color: var(--theme-border);
        }

        .ios-list-item:hover { background-color: var(--theme-surface-alt); }
        .ios-list-item.clickable { cursor: pointer; }

        .ios-list-left { display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0; }
        .ios-list-right { display: flex; align-items: center; gap: 0.8rem; flex-shrink: 0; }

        /* ไอคอนสี่เหลี่ยมมน แบบ iOS Settings */
        .ios-icon-box {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; flex-shrink: 0;
        }
        .bg-shipping { background-color: var(--theme-success); }
        .bg-special { background-color: var(--theme-warning); }
        .bg-deposit { background-color: var(--theme-danger); }
        .bg-bank { background-color: var(--theme-primary); }

        .ios-item-title { font-size: 1.05rem; font-weight: 500; color: var(--theme-text); white-space: pre-wrap; line-height: 1.4; }

        /* สวิตช์เปิด-ปิด สไตล์ iOS (Toggle Switch) */
        .ios-switch { position: relative; display: inline-block; width: 48px; height: 28px; flex-shrink: 0; cursor: pointer; }
        .ios-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--theme-surface-hover);
            transition: .3s; border-radius: 34px; border: 1px solid var(--theme-border);
        }
        .slider:before {
            position: absolute; content: ""; height: 24px; width: 24px; left: 1px; bottom: 1px;
            background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        /* สีตอนเปิดสวิตช์ */
        input:checked + .slider.color-shipping { background-color: var(--theme-success); border-color: var(--theme-success); }
        input:checked + .slider.color-special { background-color: var(--theme-warning); border-color: var(--theme-warning); }
        input:checked + .slider.color-deposit { background-color: var(--theme-danger); border-color: var(--theme-danger); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* ป้ายแสดงราคา (กดแก้ได้) */
        .fee-edit-badge {
            display: flex; align-items: center; gap: 0.4rem;
            background-color: var(--theme-surface-hover); color: var(--theme-text);
            padding: 0.35rem 0.6rem; border-radius: 8px; font-size: 0.95rem; font-weight: 500;
            cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
        }
        .fee-edit-badge:hover { border-color: var(--theme-primary); background-color: var(--theme-primary-alpha); color: var(--theme-accent-text); }

        /* ปุ่มแก้ไข/ลบ ในรายชื่อธนาคาร */
        .bank-action-btn {
            background: var(--theme-surface-hover); color: var(--theme-text); border: none;
            width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; padding: 0;
        }
        .bank-action-btn:hover { background-color: var(--theme-primary); color: white; }
        .bank-action-btn.delete:hover { background-color: var(--theme-danger); color: white; }
        
        .check-indicator { width: 20px; display: flex; justify-content: center; }

        /* ========================================= */

        textarea { height: 350px; resize: vertical; line-height: 1.6; }
        .action-buttons-group { display: flex; gap: 1rem; margin-top: 1rem; }

        .help-section { width: 100%; max-width: 1800px; margin: 2rem auto 0 auto; background: var(--theme-surface); border: 1px solid var(--theme-border); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; }
        .help-toggle { width: 100%; background: transparent; color: var(--theme-text); border: none; padding: 1.25rem 2rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.2s; }
        .help-toggle:hover { background-color: var(--theme-surface-hover); }
        .help-content { max-height: 0; padding: 0 2rem; opacity: 0; transition: all 0.3s ease; }
        .help-content.open { max-height: 2500px; padding: 0 2rem 2rem 2rem; opacity: 1; border-top: 1px solid var(--theme-border); }
        .help-content h3 { color: var(--theme-primary); margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 1.1rem; }
        .help-content ul { margin: 0; padding-left: 1.5rem; color: var(--theme-text-muted); line-height: 1.6; }
        .help-content li { margin-bottom: 0.5rem; }
        .help-content code { background: var(--theme-bg); padding: 0.15rem 0.5rem; border-radius: 6px; color: var(--theme-accent-text); border: 1px solid var(--theme-border); }
        
        .app-footer { margin-top: 2rem; text-align: center; color: var(--theme-text-muted); font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; }
        #themeSelector { padding: 0.4rem 0.8rem; border-radius: 8px; background: var(--theme-surface-alt); color: var(--theme-text); border: 1px solid var(--theme-border); font-family: inherit; font-size: 0.95rem; cursor: pointer; outline: none; transition: all 0.2s; }
        #themeSelector:hover { border-color: var(--theme-primary); }

        @media (max-width: 800px) {
            body { padding: 1rem 0.5rem; } 
            .container { grid-template-columns: 1fr; gap: 1.5rem; }
            .panel { padding: 1.25rem; border-radius: 16px; }
            .main-header { flex-direction: column; align-items: stretch; gap: 1rem; }
            .collection-header { flex-wrap: wrap; }
            .header-left { width: 100%; flex: none; }
            .header-actions { width: 100%; justify-content: flex-end; }
            
            .product-header-row { grid-template-columns: 85px 1fr 85px; grid-template-rows: auto auto; gap: 0.6rem; }
            .productName { grid-column: 1 / 3; grid-row: 1; } 
            .productPrice { grid-column: 3 / 4; grid-row: 1; } 
            .productQty { grid-column: 1 / 2; grid-row: 2; } 
            .product-actions { grid-column: 2 / 4; grid-row: 2; justify-content: flex-end; } 

            .action-buttons-group { flex-direction: column; gap: 0.5rem; }
            textarea { height: 250px; } 
            .help-toggle { padding: 1rem; font-size: 1rem; }
            .help-content.open { padding: 0 1rem 1.5rem 1rem; }
        }
    </style>
</head>

<div class="container">
    <div class="panel">
        <div class="main-header">
            <h2>
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--theme-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                ออเดอร์ <span class="version-badge">v8.2 (iOS Native)</span>
            </h2>
            <button class="btn btn-danger-outline" style="padding: 0.55rem 1rem; font-size: 0.95rem;" onclick="clearAllPills()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                ล้างตัวเลือก
            </button>
        </div>
        
        <div id="collectionsContainer"></div>

        <button class="btn btn-primary" style="width: 100%; margin-bottom: 2rem;" onclick="addCollectionBlock()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            เพิ่มคอลเลคชั่นใหม่
        </button>
        
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="section-label">ตั้งค่าจัดส่ง & มัดจำ</label>
            <div class="ios-list-group">
                
                <div class="ios-list-item">
                    <div class="ios-list-left">
                        <div class="ios-icon-box bg-shipping">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>

                        <span class="ios-item-title">ค่าจัดส่ง</span>
                    </div>
                    <div class="ios-list-right">
                        <div class="fee-edit-badge" onclick="editFee('shipping', 'ค่าจัดส่ง')">
                            <span id="val_shipping">50</span>.- 
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        </div>
                        <label class="ios-switch">
                            <input type="checkbox" id="check_shipping" onchange="updateData()" checked>
                            <span class="slider color-shipping"></span>

                    </div>
                </div>

                <div class="ios-list-item">
                    <div class="ios-list-left">
                        <div class="ios-icon-box bg-special">

                        </div>
                        <span class="ios-item-title">พื้นที่พิเศษ</span>
                    </div>
                    <div class="ios-list-right">
                        <div class="fee-edit-badge" onclick="editFee('special', 'พื้นที่พิเศษ')">
                            <span id="val_special">50</span>.- 
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        </div>
                        <label class="ios-switch">
                            <input type="checkbox" id="check_special" onchange="updateData()">
                            <span class="slider color-special"></span>
                        </label>
                    </div>
                </div>

                <div class="ios-list-item">
                    <div class="ios-list-left">
                        <div class="ios-icon-box bg-deposit">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        </div>
                        <span class="ios-item-title">หักมัดจำ</span>
                    </div>
                    <div class="ios-list-right">
                        <div class="fee-edit-badge" onclick="editFee('deposit', 'หักมัดจำ')">
                            <span id="val_deposit">100</span>.- 
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        </div>
                        <label class="ios-switch">
                            <input type="checkbox" id="check_deposit" onchange="updateData()">
                            <span class="slider color-deposit"></span>
                        </label>
                    </div>
                </div>

            </div>
        </div>

        <div class="form-group" style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;">
                <label class="section-label" style="margin: 0;">บัญชีธนาคาร</label>
                <button class="btn-add-row" onclick="addBank()" style="margin: 0; font-size: 0.9rem;">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    เพิ่มบัญชี
                </button>
            </div>
            <div id="bankContainer">
                </div>
        </div>

        <button class="btn btn-danger-outline" style="width: 100%; margin-top: 1.5rem;" onclick="clearData()">
            ล้างข้อมูลสินค้าทั้งหมด
        </button>
        
        <div class="action-buttons-group">
            <button class="btn" style="flex: 1;" onclick="exportData()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                ส่งออก
            </button>
            <button class="btn" style="flex: 1;" onclick="importData()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                นำเข้า
            </button>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin-bottom: 1.5rem; font-size: 1.3rem;">สรุปยอดโอน</h2>
        <div class="form-group">
            <textarea id="outputText" readonly placeholder="ข้อความสรุปยอดจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 3rem;" onclick="copyText('outputText')">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            คัดลอกสรุปยอด
        </button>

        <h2 style="margin-bottom: 1.5rem; font-size: 1.3rem;">ใบปะหน้า</h2>
        <div class="form-group">
            <textarea id="outputLabelText" readonly placeholder="ข้อความสำหรับใบปะหน้าจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn btn-success" style="width: 100%;" onclick="copyText('outputLabelText')">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            คัดลอกใบปะหน้า
        </button>
    </div>
</div>

<div class="help-section">
    <button class="help-toggle" onclick="toggleHelp()">
        <span>📖 คู่มือการใช้งานระบบ (คลิกเพื่อเปิดอ่าน)</span>
        <span id="help-icon" style="transition: transform 0.3s;">▼</span>
    </button>
    <div class="help-content" id="helpContent">
        <div id="helpLoading" style="display: none; text-align: center; padding: 2rem; color: var(--theme-text-muted);">
            ⏳ กำลังโหลดข้อมูล...
        </div>
        <div id="helpInner"></div>
    </div>
</div>

<div class="app-footer">
    <label for="themeSelector">🎨 เลือกธีม:</label>
    <select id="themeSelector" onchange="changeTheme()">
        <option value="ios">iOS Dark</option>
        <option value="github">GitHub Dark</option>
    </select>
</div>

<script>
    const ICON_CHEV_RIGHT = `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
    const ICON_CHEV_DOWN = `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    const ICON_UP = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
    const ICON_DOWN = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    const ICON_TRASH = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
    const ICON_COPY = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_GEAR = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`;
    const ICON_PLUS = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;

    let defaultBanks = [];

    window.onload = function() {
        const savedTheme = localStorage.getItem('appTheme') || 'ios';
        document.getElementById('themeSelector').value = savedTheme;
        document.documentElement.setAttribute('data-theme', savedTheme);

        renderBanks(); 
        loadData();
        generateText(); 
    };

    function updateData() {
        saveData();
        generateText();
    }

    function changeTheme() {
        const theme = document.getElementById('themeSelector').value;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('appTheme', theme);
    }

    function editFee(id, name) {
        const span = document.getElementById('val_' + id);
        const currentVal = span.innerText;
        const newVal = prompt(`⚙️ ตั้งค่าราคา "${name}" (บาท):`, currentVal);
        if (newVal !== null && newVal.trim() !== '' && !isNaN(newVal)) {
            span.innerText = parseFloat(newVal);
            updateData();
        }
    }

    function renderBanks() {
        let banks = JSON.parse(localStorage.getItem('bankData')) || defaultBanks;
        const container = document.getElementById('bankContainer');
        let selectedId = localStorage.getItem('bank');
        
        if (!banks.find(b => b.id === selectedId) && banks.length > 0) {
            selectedId = banks[0].id;
        }

        container.innerHTML = '<div class="ios-list-group" id="bankListGroup"></div>';
        const group = document.getElementById('bankListGroup');

        banks.forEach(b => {
            const isActive = b.id === selectedId;
            // เครื่องหมายถูกสีฟ้าแบบ Apple
            const checkIcon = isActive ? `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--theme-primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` : ``;
            
            const html = `
                <div class="ios-list-item clickable" onclick="selectBank('${b.id}')">
                    <div class="ios-list-left">
                        <div class="ios-icon-box bg-bank">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                        </div>
                        <span class="ios-item-title">${b.text}</span>
                    </div>
                    <div class="ios-list-right">
                        <button class="bank-action-btn edit" onclick="event.stopPropagation(); editBank('${b.id}')" title="แก้ไข">
                            ${ICON_GEAR}
                        </button>
                        <button class="bank-action-btn delete" onclick="event.stopPropagation(); deleteBank('${b.id}')" title="ลบ">
                            ${ICON_TRASH}
                        </button>
                        <div class="check-indicator">${checkIcon}</div>
                    </div>
                </div>
            `;
            group.insertAdjacentHTML('beforeend', html);
        });
    }

    function selectBank(id) {
        localStorage.setItem('bank', id);
        renderBanks();
        updateData();
    }

    function addBank() {
        const input = prompt("🏦 เพิ่มข้อมูลบัญชีใหม่\n(พิมพ์ // เพื่อบังคับขึ้นบรรทัดใหม่ เช่น ธ.กสิกร // 12345 // สมชาย):");
        if (input && input.trim() !== '') {
            let banks = JSON.parse(localStorage.getItem('bankData')) || defaultBanks;
            const formattedText = input.split('//').map(s => s.trim()).join('\n');
            const newId = 'b' + Date.now();
            banks.push({ id: newId, text: formattedText });
            localStorage.setItem('bankData', JSON.stringify(banks));
            selectBank(newId); // เลือกแบงค์ใหม่ให้อัตโนมัติ
        }
    }

    function editBank(id) {
        let banks = JSON.parse(localStorage.getItem('bankData')) || defaultBanks;
        const bank = banks.find(b => b.id === id);
        if (bank) {
            const currentText = bank.text.split('\n').join(' // ');
            const input = prompt("✏️ แก้ไขข้อมูลบัญชี\n(พิมพ์ // เพื่อบังคับขึ้นบรรทัดใหม่):", currentText);
            if (input !== null && input.trim() !== '') {
                bank.text = input.split('//').map(s => s.trim()).join('\n');
                localStorage.setItem('bankData', JSON.stringify(banks));
                renderBanks();
                updateData();
            }
        }
    }

    function deleteBank(id) {
        if(confirm("❌ แน่ใจหรือไม่ว่าต้องการลบบัญชีนี้ทิ้ง?")) {
            let banks = JSON.parse(localStorage.getItem('bankData')) || defaultBanks;
            banks = banks.filter(b => b.id !== id);
            localStorage.setItem('bankData', JSON.stringify(banks));
            renderBanks();
            updateData();
        }
    }

    function saveData() {
        localStorage.setItem('val_shipping', document.getElementById('val_shipping').innerText);
        localStorage.setItem('val_special', document.getElementById('val_special').innerText);
        localStorage.setItem('val_deposit', document.getElementById('val_deposit').innerText);
        
        localStorage.setItem('check_shipping', document.getElementById('check_shipping').checked);
        localStorage.setItem('check_special', document.getElementById('check_special').checked);
        localStorage.setItem('check_deposit', document.getElementById('check_deposit').checked);

        const collections = [];
        document.querySelectorAll('.collection-block').forEach(block => {
            const colName = block.querySelector('.collectionName').value;
            const isCollapsed = block.classList.contains('collapsed');
            const products = [];
            
            block.querySelectorAll('.product-item').forEach(item => {
                const name = item.querySelector('.productName').value;
                const price = item.querySelector('.productPrice').value;
                const qty = item.querySelector('.productQty').value;
                const optionRows = [];
                
                item.querySelectorAll('.option-row').forEach(rowEl => {
                    const availableSizes = [];
                    const selectedSizes = [];
                    rowEl.querySelectorAll('.pill[data-size]').forEach(pill => {
                        const size = pill.getAttribute('data-size');
                        availableSizes.push(size);
                        if (pill.classList.contains('active')) selectedSizes.push(size);
                    });
                    optionRows.push({ availableSizes, selectedSizes });
                });
                products.push({ name, price, qty, optionRows });
            });
            collections.push({ colName, isCollapsed, products });
        });
        localStorage.setItem('orderDataV3', JSON.stringify(collections));
    }

    function loadData() {
        if (localStorage.getItem('val_shipping')) document.getElementById('val_shipping').innerText = localStorage.getItem('val_shipping');
        if (localStorage.getItem('val_special')) document.getElementById('val_special').innerText = localStorage.getItem('val_special');
        if (localStorage.getItem('val_deposit')) document.getElementById('val_deposit').innerText = localStorage.getItem('val_deposit');

        ['shipping', 'special', 'deposit'].forEach(id => {
            let savedState = localStorage.getItem('check_' + id);
            let checkbox = document.getElementById('check_' + id);
            
            if (savedState === 'false') {
                checkbox.checked = false;
            } else if (savedState === 'true') {
                checkbox.checked = true;
            } else {
                if(id === 'shipping') checkbox.checked = true;
                else checkbox.checked = false;
            }
        });

        const container = document.getElementById('collectionsContainer');
        container.innerHTML = ''; 
        let savedData = JSON.parse(localStorage.getItem('orderDataV3'));
        
        if (savedData && savedData.length > 0) {
            savedData.forEach(col => {
                const block = addCollectionBlock(col.colName, col.isCollapsed);
                if(col.products.length > 0) {
                    col.products.forEach(p => {
                        block.querySelector('.productList').appendChild(createProductItemElement(p.name, p.price, p.qty, p.optionRows));
                    });
                } else {
                    block.querySelector('.productList').appendChild(createProductItemElement()); 
                }
            });
        } 
    }

    function exportData() {
        saveData();
        const data = localStorage.getItem('orderDataV3');
        if (!data || data === '[]') { alert('ไม่มีข้อมูล'); return; }
        const encodedData = btoa(encodeURIComponent(data));
        navigator.clipboard.writeText(encodedData).then(() => alert('📋 คัดลอกโค้ดสำเร็จ!')).catch(() => prompt('คัดลอกโค้ดนี้:', encodedData));
    }

    function importData() {
        const code = prompt('📥 วางโค้ดที่คัดลอกมา:');
        if (!code) return;
        try {
            localStorage.setItem('orderDataV3', decodeURIComponent(atob(code)));
            loadData(); generateText(); alert('✅ นำเข้าสำเร็จ!');
        } catch(e) { alert('❌ โค้ดไม่ถูกต้อง'); }
    }

    function toggleCollection(btn) {
        const block = btn.closest('.collection-block');
        block.classList.toggle('collapsed');
        btn.innerHTML = block.classList.contains('collapsed') ? ICON_CHEV_RIGHT : ICON_CHEV_DOWN;
        saveData();
    }

    function moveCollectionUp(btn) {
        const block = btn.closest('.collection-block');
        if (block.previousElementSibling) { block.parentNode.insertBefore(block, block.previousElementSibling); saveData(); generateText(); }
    }

    function moveCollectionDown(btn) {
        const block = btn.closest('.collection-block');
        if (block.nextElementSibling) { block.parentNode.insertBefore(block.nextElementSibling, block); saveData(); generateText(); }
    }

    function addCollectionBlock(colName = '', isCollapsed = false) {
        const container = document.getElementById('collectionsContainer');
        const block = document.createElement('div');
        block.className = 'collection-block';
        if(isCollapsed) block.classList.add('collapsed');
        
        block.innerHTML = `
            <div class="collection-header">
                <div class="header-left">
                    <button class="btn-toggle-col" onclick="toggleCollection(this)">${isCollapsed ? ICON_CHEV_RIGHT : ICON_CHEV_DOWN}</button>
                    <input type="text" class="collectionName" placeholder="ชื่อคอลเลคชั่น (ไม่ระบุก็ได้)" value="${colName}" style="margin: 0;">
                </div>
                <div class="header-actions">
                    <button class="btn-icon btn-move" onclick="moveCollectionUp(this)" title="เลื่อนขึ้น">${ICON_UP}</button>
                    <button class="btn-icon btn-move" onclick="moveCollectionDown(this)" title="เลื่อนลง">${ICON_DOWN}</button>
                    <button class="btn-icon btn-remove" onclick="removeCollectionBlock(this)" title="ลบคอลเลคชั่น">${ICON_TRASH}</button>
                </div>
            </div>
            <div class="collection-body">
                <div class="productList"></div>
                <button class="btn-add-row" style="margin-top: 1rem; width: 100%; justify-content: center; background: var(--theme-surface-alt);" onclick="handleAddProductClick(this)">
                    ${ICON_PLUS} เพิ่มสินค้า
                </button>
            </div>
        `;
        container.appendChild(block);
        if(colName === '' && arguments.length === 0) {
            block.querySelector('.productList').appendChild(createProductItemElement());
            saveData(); generateText();
        }
        return block;
    }

    function removeCollectionBlock(btn) {
        if(confirm('❌ ต้องการลบคอลเลคชั่นนี้พร้อมรายการสินค้าข้างในทิ้งทั้งหมด ใช่หรือไม่?')) { 
            btn.closest('.collection-block').remove(); 
            saveData(); 
            generateText(); 
        }
    }

    function clearAllPills() {
        document.querySelectorAll('.product-options-container .pill.active').forEach(pill => pill.classList.remove('active'));
        document.querySelectorAll('.productQty').forEach(qty => qty.value = 1);
        
        ['special', 'deposit'].forEach(id => {
            document.getElementById('check_' + id).checked = false;
        });
        
        saveData(); generateText();
    }

    function handleAddProductClick(btn) {
        btn.previousElementSibling.appendChild(createProductItemElement());
        saveData(); generateText();
    }

    function moveProductUp(btn) {
        const item = btn.closest('.product-item');
        if (item.previousElementSibling) { item.parentNode.insertBefore(item, item.previousElementSibling); saveData(); generateText(); }
    }

    function moveProductDown(btn) {
        const item = btn.closest('.product-item');
        if (item.nextElementSibling) { item.parentNode.insertBefore(item.nextElementSibling, item); saveData(); generateText(); }
    }

    function createOptionRowHtml(availableSizes, selectedSizes) {
        let pillsHtml = availableSizes.map(s => `<div class="pill ${selectedSizes.includes(s) ? 'active' : ''}" onclick="togglePill(this)" data-size="${s}">${s}</div>`).join('');
        let actionsHtml = `<button class="pill-action" onclick="editPillsList(this)" title="ตั้งค่าตัวเลือก/ลบแถว">${ICON_GEAR}</button>`;
        return `<div class="option-row"><div class="size-pills">${pillsHtml}${actionsHtml}</div></div>`;
    }

    function createProductItemElement(name = '', price = '', qty = 1, optionRowsArray = null) {
        const newItem = document.createElement('div');
        newItem.className = 'product-item';
        let rows = [];
        if (optionRowsArray !== null) {
            if (optionRowsArray.length === 0) rows = [ { availableSizes: ['-'], selectedSizes: [] } ];
            else rows = optionRowsArray;
        } else {
            rows = [ { availableSizes: ['S', 'M', 'L', 'XL', '2XL'], selectedSizes: [] } ];
        }
        let rowsHtml = rows.map((r) => createOptionRowHtml(r.availableSizes, r.selectedSizes)).join('');
        
        newItem.innerHTML = `
            <div class="product-header-row">
                <input type="text" class="productName" placeholder="ชื่อสินค้า" value="${name}">
                <input type="number" class="productPrice" placeholder="ราคา" value="${price}">
                <input type="number" class="productQty" placeholder="ชิ้น" title="จำนวนชิ้น" value="${qty || 1}" min="1">
                <div class="product-actions">
                    <button class="btn-icon btn-move" onclick="moveProductUp(this)" title="เลื่อนขึ้น">${ICON_UP}</button>
                    <button class="btn-icon btn-move" onclick="moveProductDown(this)" title="เลื่อนลง">${ICON_DOWN}</button>
                    <button class="btn-icon btn-clone" onclick="cloneProduct(this)" title="คัดลอก">${ICON_COPY}</button>
                    <button class="btn-icon btn-remove" onclick="removeProduct(this)" title="ลบสินค้านี้">${ICON_TRASH}</button>
                </div>
            </div>
            <div class="product-options-container">${rowsHtml}</div>
            <button class="btn-add-row" onclick="addOptionRow(this)">${ICON_PLUS} เพิ่มตัวเลือกบรรทัดถัดไป</button>
        `;
        return newItem;
    }

    function addOptionRow(btn) {
        const newSizesStr = prompt('ตั้งค่าตัวเลือก (คั่นด้วยลูกน้ำ ,):');
        if (newSizesStr && newSizesStr.trim() !== '') {
            let newSizes = newSizesStr.split(',').map(s => s.trim()).filter(s => s !== '');
            if (newSizes.length > 0) {
                btn.previousElementSibling.insertAdjacentHTML('beforeend', createOptionRowHtml(newSizes, []));
                saveData(); generateText();
            }
        }
    }

    function cloneProduct(btn) {
        const item = btn.closest('.product-item');
        const rows = Array.from(item.querySelectorAll('.option-row')).map(rowEl => ({
            availableSizes: Array.from(rowEl.querySelectorAll('.pill[data-size]')).map(p => p.getAttribute('data-size')),
            selectedSizes: []
        }));
        item.parentNode.insertBefore(createProductItemElement(item.querySelector('.productName').value, item.querySelector('.productPrice').value, 1, rows), item.nextSibling);
        saveData(); generateText();
    }

    function togglePill(pill) { pill.classList.toggle('active'); saveData(); generateText(); }

    function editPillsList(btn) {
        const container = btn.closest('.size-pills');
        const row = container.closest('.option-row');
        const item = row.closest('.product-item');
        const currentSizes = Array.from(container.querySelectorAll('.pill[data-size]')).map(p => p.getAttribute('data-size'));
        
        const newSizesStr = prompt('ตั้งค่าปุ่ม (คั่นด้วยลูกน้ำ ,)\n* หากต้องการลบแถวนี้ออก ให้ลบข้อความออกให้หมดแล้วกด OK:', currentSizes.join(','));

        if (newSizesStr !== null) {
            let newSizes = newSizesStr.split(',').map(s => s.trim()).filter(s => s !== '');
            if (newSizes.length === 0) {
                const allRows = item.querySelectorAll('.option-row');
                if (allRows.length <= 1) newSizes = ['-'];
                else { row.remove(); saveData(); generateText(); return; }
            }
            const selectedSizes = Array.from(container.querySelectorAll('.pill.active')).map(p => p.getAttribute('data-size'));
            row.outerHTML = createOptionRowHtml(newSizes, selectedSizes);
            saveData(); generateText();
        }
    }

    function removeProduct(btn) { 
        if(confirm('❌ ต้องการลบสินค้านี้ใช่หรือไม่?')) {
            btn.closest('.product-item').remove(); 
            saveData(); 
            generateText(); 
        }
    }

    function clearData() { 
        if(confirm('🚨 คุณกำลังจะล้างข้อมูลรายการสินค้าที่สร้างไว้ทั้งหมด!\n(ข้อมูลบัญชีธนาคารและการตั้งค่าจะไม่หาย)\n\nแน่ใจใช่หรือไม่?')) { 
            localStorage.removeItem('orderDataV3'); 
            location.reload(); 
        } 
    }

    function generateText() {
        const shippingValue = document.getElementById('check_shipping').checked ? parseFloat(document.getElementById('val_shipping').innerText) : 0;
        const specialShippingValue = document.getElementById('check_special').checked ? parseFloat(document.getElementById('val_special').innerText) : 0;
        const depositValue = document.getElementById('check_deposit').checked ? parseFloat(document.getElementById('val_deposit').innerText) : 0;

        let finalProductsText = '', labelLines = [], validPrices = [], hasMissingPrice = false, productsSum = 0;
        
        document.querySelectorAll('.collection-block').forEach(block => {
            const colName = block.querySelector('.collectionName').value.trim();
            let colText = '', colLabelProducts = [], mergedMap = {}, orderArr = [];
            
            block.querySelectorAll('.product-item').forEach(item => {
                const nameVal = item.querySelector('.productName').value.trim();
                const rawPrice = item.querySelector('.productPrice').value.trim();
                const qtyVal = parseInt(item.querySelector('.productQty').value.trim()) || 1; 
                const rowEls = item.querySelectorAll('.option-row');
                
                if (rowEls.length === 0 || (rowEls.length === 1 && rowEls[0].querySelector('.pill.active[data-size="-"]'))) {
                    if (nameVal !== '') {
                        const hasOtherActive = item.querySelector('.pill.active:not([data-size="-"])');
                        if (!hasOtherActive) {
                            if (!mergedMap[nameVal]) { mergedMap[nameVal] = []; orderArr.push(nameVal); }
                            let token = qtyVal > 1 ? `x${qtyVal}` : '';
                            mergedMap[nameVal].push(token);
                            if (rawPrice === '') {
                                validPrices.push('***'); hasMissingPrice = true;
                            } else {
                                const pVal = parseFloat(rawPrice);
                                validPrices.push(qtyVal > 1 ? `${pVal}x${qtyVal}` : pVal);
                                productsSum += (pVal * qtyVal);
                            }
                        }
                    }
                } 
                else {
                    let textParts = [], activeCounts = [0];
                    rowEls.forEach(rowEl => {
                        const actives = rowEl.querySelectorAll('.pill.active');
                        activeCounts.push(actives.length);
                        if (actives.length > 0) {
                            const validSizes = Array.from(actives).map(p => p.getAttribute('data-size')).filter(s => s !== '-');
                            if (validSizes.length > 0) textParts.push(validSizes.join(',')); 
                        }
                    });

                    let totalActive = Math.max(...activeCounts);

                    if (nameVal !== '' && totalActive > 0) {
                        if (!mergedMap[nameVal]) { mergedMap[nameVal] = []; orderArr.push(nameVal); }
                        let token = textParts.length > 0 ? `(${textParts.join(' ')})` : '';
                        if (qtyVal > 1) token += (token !== '' ? ` x${qtyVal}` : `x${qtyVal}`); 
                        
                        if (token !== '') mergedMap[nameVal].push(token);
                        else mergedMap[nameVal].push('');

                        if (rawPrice === '') {
                            for(let i=0; i<totalActive; i++) validPrices.push('***');
                            hasMissingPrice = true;
                        } else {
                            const pVal = parseFloat(rawPrice);
                            for(let i=0; i<totalActive; i++) {
                                validPrices.push(qtyVal > 1 ? `${pVal}x${qtyVal}` : pVal);
                                productsSum += (pVal * qtyVal);
                            }
                        }
                    }
                }
            });

            orderArr.forEach(name => {
                const sizes = mergedMap[name].filter(s => s !== '').join(', ');
                const str = sizes ? `- ${name} ${sizes}\n` : `- ${name}\n`;
                colText += str; colLabelProducts.push(sizes ? `${name} ${sizes}` : `${name}`);
            });

            if (colText !== '') finalProductsText += (colName !== '' ? `${colName}\n` : '') + colText + '\n';
            if (colLabelProducts.length > 0) labelLines.push(colName !== '' ? `${colName} = ${colLabelProducts.join(' / ')}` : colLabelProducts.join(' / '));
        });
        
        let pStr = '';
        let terms = [];

        if (hasMissingPrice) {
            terms.push('***');
        } else if (validPrices.length > 0) {
            terms.push(...validPrices);
        }

        if (shippingValue > 0) terms.push(shippingValue);
        if (specialShippingValue > 0) terms.push(specialShippingValue);

        if (hasMissingPrice) {
            pStr = terms.length > 1 ? `${terms.join(' + ')}` : terms[0] || '***';
            if (depositValue > 0) pStr += ` - ${depositValue}`;
            pStr += ` = ***`;
        } else {
            let total = productsSum + shippingValue + specialShippingValue - depositValue;
            if (terms.length > 0) {
                pStr = terms.length > 1 ? `${terms.join(' + ')}` : `${terms[0]}`;
                if (depositValue > 0) pStr += ` - ${depositValue}`;
                pStr += ` = ${total}`;
            } else {
                pStr = depositValue > 0 ? `0 - ${depositValue} = ${total}` : `0 = 0`;
            }
        }

        let costBreakdownText = '';
        if (shippingValue > 0) costBreakdownText += `ค่าจัดส่ง: ${shippingValue} บาท\n`;
        if (specialShippingValue > 0) costBreakdownText += `พื้นที่พิเศษ: ${specialShippingValue} บาท\n`;
        if (depositValue > 0) costBreakdownText += `หักมัดจำ: -${depositValue} บาท\n`;

        let bankText = '';
        const selectedBankId = localStorage.getItem('bank');
        if (selectedBankId) {
            let banks = JSON.parse(localStorage.getItem('bankData')) || defaultBanks;
            const selectedBank = banks.find(b => b.id === selectedBankId);
            if (selectedBank) bankText = selectedBank.text;
        }
        if (bankText === '') bankText = "(กรุณาเลือกหรือเพิ่มบัญชีธนาคาร)";

        document.getElementById('outputText').value = finalProductsText === '' ? '- ไม่มีรายการสินค้า -\n\n' : `${finalProductsText}${costBreakdownText}ยอดรวม: ${pStr} บาท\n\n--------------------------\nชำระเงินได้ที่:\n${bankText}\n\nโอนเงินแล้วกรุณาส่งสลิป และที่อยู่ให้ด้วยนะคะ`;
        document.getElementById('outputLabelText').value = labelLines.join('\n');
    }

    function copyText(id) {
        const el = document.getElementById(id);
        if(el.value.trim() === '') return;
        el.select(); document.execCommand('copy'); window.getSelection().removeAllRanges();
    }

    let helpLoaded = false;
    async function toggleHelp() {
        const content = document.getElementById('helpContent');
        const icon = document.getElementById('help-icon');
        const inner = document.getElementById('helpInner');
        const loading = document.getElementById('helpLoading');

        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.style.transform = 'rotate(0deg)';
        } else {
            content.classList.add('open');
            icon.style.transform = 'rotate(180deg)';
            if (!helpLoaded) {
                loading.style.display = 'block';
                try {
                    const response = await fetch('help.html');
                    if (response.ok) {
                        inner.innerHTML = await response.text();
                        helpLoaded = true;
                    } else {
                        inner.innerHTML = '<p style="color: var(--theme-danger); text-align: center; margin-top: 2rem;">ไม่สามารถโหลดคู่มือได้</p>';
                    }
                } catch (error) {
                    inner.innerHTML = '<p style="color: var(--theme-danger); text-align: center; margin-top: 2rem;">เกิดข้อผิดพลาดในการโหลดไฟล์คู่มือ</p>';
                } finally {
                    loading.style.display = 'none';
                }
            }
        }
    }
</script>
</body>
</html>
