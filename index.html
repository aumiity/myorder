<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myorder</title>
    <style>
        :root {
            --primary: #6366F1; 
            --primary-hover: #818CF8;
            --bg: #111827; 
            --surface: #1F2937; 
            --surface-alt: #374151; 
            --text: #F9FAFB; 
            --text-muted: #9CA3AF; 
            --border: #4B5563; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem 3rem; 
            display: flex;
            justify-content: center;
        }
        .container {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 2.5rem; 
            width: 98%; 
            max-width: 1800px; 
        }
        .panel {
            background: var(--surface);
            padding: 2rem; 
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); 
        }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h2 { margin: 0; color: var(--primary); font-size: 1.8rem; display: flex; align-items: baseline; gap: 0.5rem; }
        .version-badge { font-size: 0.9rem; color: var(--text-muted); font-weight: normal; }
        
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1.05rem; 
        }
        
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--surface-alt);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px; 
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.2s;
        }
        input::placeholder, textarea::placeholder { color: #9CA3AF; }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
            background-color: #4B5563; 
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }
        
        .collection-block {
            background-color: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .btn-toggle-col {
            background: var(--surface-alt);
            color: var(--text);
            border: none;
            width: 44px; height: 44px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .btn-toggle-col:hover { background: var(--border); }
        
        .collection-block.collapsed .collection-header { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .collection-block.collapsed .collection-body { display: none; }
        
        .product-item {
            background: var(--surface);
            padding: 0.85rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
        }
        
        .product-header-row {
            display: grid;
            grid-template-columns: 1fr 80px 60px auto; 
            gap: 0.5rem; 
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .product-header-row input { padding: 0.5rem 0.6rem; font-size: 0.95rem; }
        .productName { width: 100%; font-weight: bold; }
        .productPrice { width: 100%; text-align: center; }
        .productQty { width: 100%; text-align: center; }
        .product-actions { display: flex; gap: 0.3rem; }
        
        .option-row {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
            border-left: 2px solid var(--border);
        }
        
        .size-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
        }
        
        .pill {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--surface-alt);
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .pill:hover { border-color: var(--text); color: var(--text); }
        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }
        .pill-custom {
            border-style: dashed;
            background: transparent;
            color: var(--text-muted);
            border-color: var(--text-muted);
        }
        .pill-custom:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); border-color: var(--text); }
        .pill-danger { border-color: #F87171; color: #F87171; }
        .pill-danger:hover { background: rgba(248, 113, 113, 0.1); color: #FCA5A5; border-color: #FCA5A5; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s;
        }
        .btn:hover, .btn:active { background-color: var(--primary-hover); }
        
        .btn-icon {
            padding: 0;
            width: 32px; height: 32px;
            flex-shrink: 0; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; color: white; 
        }
        .btn-move { background-color: #6B7280; }
        .btn-move:hover, .btn-move:active { background-color: #4B5563; }
        .btn-clone { background-color: #3B82F6; }
        .btn-clone:hover, .btn-clone:active { background-color: #2563EB; }
        .btn-remove { background-color: #EF4444; }
        .btn-remove:hover, .btn-remove:active { background-color: #DC2626; }
        
        .btn-remove-col {
            background-color: transparent;
            color: #F87171; border: 1px solid #F87171;
            padding: 0.4rem 0.85rem; font-size: 0.95rem;
            border-radius: 6px; cursor: pointer;
        }
        .btn-remove-col:hover { background: rgba(248, 113, 113, 0.1); }

        .btn-clear-all-sizes {
            background-color: var(--surface-alt);
            color: var(--text);
            padding: 0.5rem 1rem; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600;
            border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s;
        }
        .btn-clear-all-sizes:hover { background-color: var(--border); }
        
        .btn-add-row {
            background: transparent; color: var(--primary);
            border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600;
            padding: 0.5rem; margin-top: 0.25rem; display: inline-block;
        }
        .btn-add-row:hover { text-decoration: underline; }

        .radio-group { display: flex; flex-direction: column; gap: 0.75rem; }
        .radio-group label {
            display: flex; align-items: flex-start; font-weight: normal; gap: 0.75rem;
            cursor: pointer; padding: 0.85rem; border: 1px solid var(--border);
            border-radius: 8px; background: var(--surface-alt); font-size: 1rem;
            transition: border-color 0.2s;
        }
        .radio-group label:hover { border-color: var(--primary); }
        input[type="radio"] { width: 20px; height: 20px; margin-top: 2px; cursor: pointer; accent-color: var(--primary); }
        textarea { height: 350px; resize: vertical; background-color: var(--bg); line-height: 1.6; }
        .action-buttons-group { display: flex; gap: 1rem; margin-top: 1rem; }

        @media (max-width: 800px) {
            body { padding: 1rem 0.5rem; } 
            .container { grid-template-columns: 1fr; gap: 1.5rem; width: 100%; }
            .panel { padding: 1.25rem; }
            .main-header { flex-direction: column; align-items: stretch; gap: 1rem; }
            .btn-clear-all-sizes { width: 100%; padding: 0.75rem; }
            .collection-header { flex-wrap: wrap; }
            .header-left { width: 100%; flex: none; }
            .header-actions { width: 100%; justify-content: flex-end; }
            
            .product-header-row { 
                grid-template-columns: 1fr 1fr auto; 
                grid-template-rows: auto auto;
                gap: 0.6rem;
            }
            .productName { grid-column: 1 / 4; grid-row: 1; }
            .productPrice { grid-column: 1 / 2; grid-row: 2; }
            .productQty { grid-column: 2 / 3; grid-row: 2; }
            .product-actions { grid-column: 3 / 4; grid-row: 2; justify-content: flex-end; }
            
            .action-buttons-group { flex-direction: column; gap: 0.5rem; }
            textarea { height: 250px; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="main-header">
            <h2>📝 ข้อมูลออเดอร์ <span class="version-badge">v5.2 (Clean Brackets)</span></h2>
            <button class="btn-clear-all-sizes" onclick="clearAllPills()">↺ ล้างตัวเลือกทั้งหมด</button>
        </div>
        
        <div id="collectionsContainer"></div>

        <button class="btn" style="width: 100%; background-color: #F59E0B; color: white; margin-bottom: 2rem;" onclick="addCollectionBlock()">+ เพิ่มคอลเลคชั่นใหม่</button>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 2rem;">

        <div class="form-group">
            <label>ค่าส่ง (บาท)</label>
            <input type="number" id="shippingCost" placeholder="เช่น 50" value="0">
        </div>

        <div class="form-group">
            <label>บัญชีธนาคาร</label>
            <div class="radio-group">
                <label><input type="radio" name="bank" value="TTB" checked> <span>ธ.ไทยธนชาต TTB<br>622-2-84950-4<br>กุลจิรา ล้อพงศ์ไพบูลย์</span></label>
                <label><input type="radio" name="bank" value="SCB"> <span>ธ.ไทยพาณิชย์ SCB<br>407-811653-8<br>กุลจิรา ตู้จินดา</span></label>
                <label><input type="radio" name="bank" value="KBANK"> <span>ธ.กสิกร KBANK<br>026-1-56003-8<br>กุลจิรา ตู้จินดา</span></label>
                <label><input type="radio" name="bank" value="GSB"> <span>ธ.ออมสิน GSB<br>020478034752<br>กุลจิรา ล้อพงศ์ไพบูลย์</span></label>
            </div>
        </div>

        <button class="btn" style="width: 100%; background-color: #EF4444; margin-top: 1.5rem;" onclick="clearData()">🗑️ ล้างข้อมูลทั้งหมด (ลบรายการสินค้าทิ้ง)</button>
        
        <div class="action-buttons-group">
            <button class="btn" style="flex: 1; background-color: #8B5CF6;" onclick="exportData()">📤 ส่งออกข้อมูล</button>
            <button class="btn" style="flex: 1; background-color: #14B8A6;" onclick="importData()">📥 นำเข้าข้อมูล</button>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin-bottom: 1.5rem;">📋 ข้อความสรุปยอดโอน</h2>
        <div class="form-group">
            <textarea id="outputText" readonly placeholder="ข้อความสรุปยอดจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn" style="width: 100%; background-color: #3B82F6; margin-bottom: 3rem;" onclick="copyText('outputText')">📄 คัดลอกสรุปยอด</button>

        <h2 style="margin-bottom: 1.5rem;">📦 ข้อความใบปะหน้า</h2>
        <div class="form-group">
            <textarea id="outputLabelText" readonly placeholder="ข้อความสำหรับใบปะหน้าจะแสดงตรงนี้..."></textarea>
        </div>
        <button class="btn" style="width: 100%; background-color: #10B981;" onclick="copyText('outputLabelText')">📄 คัดลอกใบปะหน้า</button>
    </div>
</div>

<script>
    window.onload = function() {
        loadData();
        const updateData = () => { saveData(); generateText(); };
        document.getElementById('shippingCost').addEventListener('input', updateData);
        document.querySelectorAll('input[name="bank"]').forEach(radio => radio.addEventListener('change', updateData));
        document.getElementById('collectionsContainer').addEventListener('input', updateData);
        generateText(); 
    };

    function saveData() {
        localStorage.setItem('shippingCost', document.getElementById('shippingCost').value);
        localStorage.setItem('bank', document.querySelector('input[name="bank"]:checked').value);

        const collections = [];
        document.querySelectorAll('.collection-block').forEach(block => {
            const colName = block.querySelector('.collectionName').value;
            const isCollapsed = block.classList.contains('collapsed');
            const products = [];
            
            block.querySelectorAll('.product-item').forEach(item => {
                const name = item.querySelector('.productName').value;
                const price = item.querySelector('.productPrice').value;
                const qty = item.querySelector('.productQty').value;
                
                const optionRows = [];
                item.querySelectorAll('.option-row').forEach(rowEl => {
                    const availableSizes = [];
                    const selectedSizes = [];
                    rowEl.querySelectorAll('.pill[data-size]').forEach(pill => {
                        const size = pill.getAttribute('data-size');
                        availableSizes.push(size);
                        if (pill.classList.contains('active')) {
                            selectedSizes.push(size);
                        }
                    });
                    optionRows.push({ availableSizes, selectedSizes });
                });
                
                products.push({ name, price, qty, optionRows });
            });
            collections.push({ colName, isCollapsed, products });
        });
        localStorage.setItem('orderDataV3', JSON.stringify(collections));
    }

    function loadData() {
        if (localStorage.getItem('shippingCost')) document.getElementById('shippingCost').value = localStorage.getItem('shippingCost');
        if (localStorage.getItem('bank')) {
            const bankVal = localStorage.getItem('bank');
            const bankInput = document.querySelector(`input[name="bank"][value="${bankVal}"]`);
            if(bankInput) bankInput.checked = true;
        }

        const container = document.getElementById('collectionsContainer');
        container.innerHTML = ''; 

        let savedData = JSON.parse(localStorage.getItem('orderDataV3'));
        
        if (savedData && savedData.length > 0) {
            savedData.forEach(col => {
                const block = addCollectionBlock(col.colName, col.isCollapsed);
                if(col.products.length > 0) {
                    col.products.forEach(p => {
                        const productList = block.querySelector('.productList');
                        productList.appendChild(createProductItemElement(p.name, p.price, p.qty, p.optionRows));
                    });
                } else {
                    const productList = block.querySelector('.productList');
                    productList.appendChild(createProductItemElement()); 
                }
            });
        } else {
            const block = addCollectionBlock('');
            const productList = block.querySelector('.productList');
            productList.appendChild(createProductItemElement());
        }
    }

    function exportData() {
        saveData();
        const data = localStorage.getItem('orderDataV3');
        if (!data || data === '[]') { alert('ยังไม่มีข้อมูลให้ส่งออกครับ'); return; }
        const encodedData = btoa(encodeURIComponent(data));
        navigator.clipboard.writeText(encodedData).then(() => {
            alert('📋 คัดลอก "โค้ดข้อมูลร้าน" เรียบร้อยแล้ว!');
        }).catch(err => {
            prompt('คัดลอกโค้ดด้านล่างนี้ ไปวางในเครื่องอื่น:', encodedData);
        });
    }

    function importData() {
        const code = prompt('📥 วาง "โค้ดข้อมูลร้าน" ที่คัดลอกมา ลงในช่องนี้:');
        if (!code) return;
        try {
            const decodedData = decodeURIComponent(atob(code));
            JSON.parse(decodedData); 
            if(confirm('🚨 การนำเข้า จะ "เขียนทับ" รายการสินค้าที่มีอยู่บนหน้าจอตอนนี้ทั้งหมด\nคุณแน่ใจหรือไม่?')) {
                localStorage.setItem('orderDataV3', decodedData);
                loadData();
                generateText();
                alert('✅ นำเข้าข้อมูลเรียบร้อย!');
            }
        } catch(e) { alert('❌ โค้ดไม่ถูกต้อง กรุณาก๊อปปี้มาใหม่'); }
    }

    function toggleCollection(btn) {
        const block = btn.closest('.collection-block');
        block.classList.toggle('collapsed');
        btn.innerHTML = block.classList.contains('collapsed') ? '▶' : '▼';
        saveData();
    }

    function moveCollectionUp(btn) {
        const block = btn.closest('.collection-block');
        const prev = block.previousElementSibling;
        if (prev) { block.parentNode.insertBefore(block, prev); saveData(); generateText(); }
    }

    function moveCollectionDown(btn) {
        const block = btn.closest('.collection-block');
        const next = block.nextElementSibling;
        if (next) { block.parentNode.insertBefore(next, block); saveData(); generateText(); }
    }

    function addCollectionBlock(colName = '', isCollapsed = false) {
        const container = document.getElementById('collectionsContainer');
        const block = document.createElement('div');
        block.className = 'collection-block';
        if(isCollapsed) block.classList.add('collapsed');
        
        const icon = isCollapsed ? '▶' : '▼';
        
        block.innerHTML = `
            <div class="collection-header">
                <div class="header-left">
                    <button class="btn-toggle-col" onclick="toggleCollection(this)" title="คลิกเพื่อยุบ/ขยาย">${icon}</button>
                    <input type="text" class="collectionName" placeholder="ชื่อคอลเลคชั่น เช่น Summer 2026" value="${colName}" style="margin: 0; padding: 0.6rem 1rem;">
                </div>
                <div class="header-actions">
                    <button class="btn btn-icon btn-move" onclick="moveCollectionUp(this)">▲</button>
                    <button class="btn btn-icon btn-move" onclick="moveCollectionDown(this)">▼</button>
                    <button class="btn btn-remove-col" onclick="removeCollectionBlock(this)">ลบชุดนี้</button>
                </div>
            </div>
            <div class="collection-body">
                <div class="productList"></div>
                <button class="btn" style="margin-top: 0.5rem; width: 100%; background-color: #10B981; padding: 0.6rem; font-size: 1rem;" onclick="handleAddProductClick(this)">+ เพิ่มสินค้าบรรทัดใหม่</button>
            </div>
        `;
        container.appendChild(block);
        
        if(colName === '' && arguments.length === 0) {
            const productList = block.querySelector('.productList');
            productList.appendChild(createProductItemElement());
            saveData(); generateText();
        }
        return block;
    }

    function removeCollectionBlock(btn) {
        if(confirm('ต้องการลบคอลเลคชั่นนี้ทิ้งใช่ไหม?')) { btn.closest('.collection-block').remove(); saveData(); generateText(); }
    }

    function clearAllPills() {
        document.querySelectorAll('.pill.active').forEach(pill => pill.classList.remove('active'));
        document.querySelectorAll('.productQty').forEach(qty => qty.value = 1);
        saveData(); generateText();
    }

    function handleAddProductClick(btn) {
        const block = btn.closest('.collection-block');
        const productList = block.querySelector('.productList');
        productList.appendChild(createProductItemElement());
        saveData(); generateText();
    }

    function moveProductUp(btn) {
        const item = btn.closest('.product-item');
        const prev = item.previousElementSibling;
        if (prev) { item.parentNode.insertBefore(item, prev); saveData(); generateText(); }
    }

    function moveProductDown(btn) {
        const item = btn.closest('.product-item');
        const next = item.nextElementSibling;
        if (next) { item.parentNode.insertBefore(next, item); saveData(); generateText(); }
    }

    function createOptionRowHtml(availableSizes, selectedSizes, isFirstRow) {
        let pillsHtml = '';
        availableSizes.forEach(s => {
            const isActive = selectedSizes.includes(s) ? 'active' : '';
            pillsHtml += `<div class="pill ${isActive}" onclick="togglePill(this)" data-size="${s}">${s}</div>`;
        });
        
        let actionsHtml = `<div class="pill pill-custom" onclick="editPillsList(this)" title="กำหนดปุ่มเอง">⚙️ จัดการปุ่ม</div>`;
        if (!isFirstRow) {
            actionsHtml += `<div class="pill pill-custom pill-danger" onclick="removeOptionRow(this)" title="ลบตัวเลือกนี้ทิ้ง">❌ ลบแถว</div>`;
        }

        return `
            <div class="option-row">
                <div class="size-pills">
                    ${pillsHtml}
                    ${actionsHtml}
                </div>
            </div>
        `;
    }

    function createProductItemElement(name = '', price = '', qty = 1, optionRowsArray = null) {
        const newItem = document.createElement('div');
        newItem.className = 'product-item';
        
        const defaultRows = [ { availableSizes: ['S', 'M', 'L', 'XL', '2XL'], selectedSizes: [] } ];
        const rows = (optionRowsArray && optionRowsArray.length > 0) ? optionRowsArray : defaultRows;

        let rowsHtml = '';
        rows.forEach((r, idx) => {
            rowsHtml += createOptionRowHtml(r.availableSizes, r.selectedSizes, idx === 0);
        });

        newItem.innerHTML = `
            <div class="product-header-row">
                <input type="text" class="productName" placeholder="ชื่อสินค้า" value="${name}">
                <input type="number" class="productPrice" placeholder="ราคา" value="${price}">
                <input type="number" class="productQty" placeholder="จำนวน" title="จำนวนชิ้น (ต่อ 1 การเลือก)" value="${qty || 1}" min="1">
                <div class="product-actions">
                    <button class="btn btn-icon btn-move" onclick="moveProductUp(this)">▲</button>
                    <button class="btn btn-icon btn-move" onclick="moveProductDown(this)">▼</button>
                    <button class="btn btn-icon btn-clone" title="คัดลอกสินค้านี้" onclick="cloneProduct(this)">📄</button>
                    <button class="btn btn-icon btn-remove" title="ลบรายการ" onclick="removeProduct(this)">-</button>
                </div>
            </div>
            <div class="product-options-container">
                ${rowsHtml}
            </div>
            <button class="btn-add-row" onclick="addOptionRow(this)">+ เพิ่มตัวเลือกบรรทัดถัดไป</button>
        `;
        return newItem;
    }

    function addOptionRow(btn) {
        const newSizesStr = prompt('📦 สร้างตัวเลือกใหม่\nกรอกตัวเลือกที่ต้องการ (เช่น ส้ม,ม่วง,กรม หรือ หญิง,ชาย) คั่นด้วยลูกน้ำ:');
        if (newSizesStr && newSizesStr.trim() !== '') {
            let newSizes = newSizesStr.split(',').map(s => s.trim()).filter(s => s !== '');
            if (newSizes.length > 0) {
                const container = btn.previousElementSibling; 
                const newRowHtml = createOptionRowHtml(newSizes, [], false);
                container.insertAdjacentHTML('beforeend', newRowHtml);
                saveData(); generateText();
            }
        }
    }

    function removeOptionRow(btn) {
        if(confirm('แน่ใจหรือไม่ที่จะลบตัวเลือกแถวนี้ทิ้ง?')) {
            btn.closest('.option-row').remove();
            saveData(); generateText();
        }
    }

    function cloneProduct(btn) {
        const currentItem = btn.closest('.product-item');
        const name = currentItem.querySelector('.productName').value;
        const price = currentItem.querySelector('.productPrice').value;
        
        const optionRows = [];
        currentItem.querySelectorAll('.option-row').forEach(rowEl => {
            const availableSizes = [];
            rowEl.querySelectorAll('.pill[data-size]').forEach(p => availableSizes.push(p.getAttribute('data-size')));
            optionRows.push({ availableSizes: availableSizes, selectedSizes: [] });
        });

        const newItem = createProductItemElement(name, price, 1, optionRows);
        currentItem.parentNode.insertBefore(newItem, currentItem.nextSibling);
        saveData(); generateText();
    }

    function togglePill(pill) {
        pill.classList.toggle('active');
        saveData(); generateText();
    }

    function editPillsList(btn) {
        const container = btn.closest('.size-pills');
        const isFirstRow = !container.querySelector('.pill-danger'); 
        const pills = container.querySelectorAll('.pill[data-size]');
        const currentSizes = Array.from(pills).map(p => p.getAttribute('data-size'));

        const newSizesStr = prompt('⚙️ ตั้งค่า "ชุดปุ่ม" ประจำแถวนี้\n(พิมพ์เฉพาะสิ่งที่ต้องการให้เหลืออยู่ คั่นด้วยลูกน้ำ ,)\n\nตัวอย่าง: S,M,L', currentSizes.join(','));

        if (newSizesStr !== null) {
            let newSizes = newSizesStr.split(',').map(s => s.trim()).filter(s => s !== '');
            if (newSizes.length === 0) newSizes = ['-']; 

            const activePills = container.querySelectorAll('.pill.active');
            const selectedSizes = [];
            activePills.forEach(p => selectedSizes.push(p.getAttribute('data-size')));

            const newRowHtml = createOptionRowHtml(newSizes, selectedSizes, isFirstRow);
            
            const row = container.closest('.option-row');
            row.outerHTML = newRowHtml;

            saveData(); generateText();
        }
    }

    function removeProduct(btn) {
        btn.closest('.product-item').remove();
        saveData(); generateText(); 
    }

    function clearData() {
        if(confirm('ล้างข้อมูลทั้งหมด?')) {
            localStorage.clear();
            location.reload();
        }
    }

    // --- ส่วนประมวลผลข้อความ ---
    function generateText() {
        const shipping = document.getElementById('shippingCost').value || '0';
        const shippingValue = parseFloat(shipping) || 0;
        
        let finalProductsText = '';
        let labelLines = []; 
        let validPrices = [];
        let hasMissingPrice = false;
        let productsSum = 0;
        
        const blocks = document.querySelectorAll('.collection-block');
        blocks.forEach(block => {
            const colName = block.querySelector('.collectionName').value.trim();
            const productItems = block.querySelectorAll('.product-item');
            
            let colText = '';
            let colLabelProducts = []; 
            
            let mergedProductsMap = {};
            let mergedProductsOrder = [];
            
            productItems.forEach(item => {
                const nameVal = item.querySelector('.productName').value.trim();
                const rawPrice = item.querySelector('.productPrice').value.trim();
                const rawQty = item.querySelector('.productQty').value.trim();
                const qtyVal = parseInt(rawQty) || 1; 

                const rowEls = item.querySelectorAll('.option-row');
                let textParts = []; // ไว้เก็บข้อความที่เลือกจากแต่ละบรรทัด (เช่น ชมพู, XL, สั้น)
                let activeCounts = [];
                let totalActive = 0;

                rowEls.forEach(rowEl => {
                    const activePills = rowEl.querySelectorAll('.pill.active');
                    activeCounts.push(activePills.length);
                    totalActive += activePills.length;
                    
                    if (activePills.length > 0) {
                        // ดึงข้อความของปุ่มที่ถูกกดในบรรทัดนั้นๆ มาเชื่อมกันด้วยลูกน้ำ (เผื่อกดหลายปุ่มในบรรทัดเดียว)
                        const sizes = Array.from(activePills).map(p => p.getAttribute('data-size'));
                        textParts.push(sizes.join(',')); 
                    }
                });

                if (nameVal !== '' && totalActive > 0) {
                    if (!mergedProductsMap[nameVal]) {
                        mergedProductsMap[nameVal] = [];
                        mergedProductsOrder.push(nameVal);
                    }

                    // เอาข้อความทั้งหมดมาเชื่อมกันด้วยเว้นวรรค แล้วค่อยใส่วงเล็บครอบทีเดียว
                    // เช่น textParts = ["ชมพู", "XL", "สั้น"] จะกลายเป็น "(ชมพู XL สั้น)"
                    const variantStr = textParts.length > 0 ? `(${textParts.join(' ')})` : '';
                    
                    let token = variantStr;
                    if (qtyVal > 1) token += `x${qtyVal}`; 
                    
                    mergedProductsMap[nameVal].push(token);

                    let itemMultiplier = Math.max(...activeCounts);
                    if (itemMultiplier < 1) itemMultiplier = 1;

                    if (rawPrice === '') {
                        for(let i=0; i<itemMultiplier; i++) validPrices.push('***');
                        hasMissingPrice = true;
                    } else {
                        const priceVal = parseFloat(rawPrice);
                        if (priceVal > 0) {
                            for(let i=0; i<itemMultiplier; i++) {
                                if (qtyVal > 1) validPrices.push(`${priceVal}x${qtyVal}`);
                                else validPrices.push(priceVal);
                                productsSum += (priceVal * qtyVal);
                            }
                        }
                    }
                }
            });

            mergedProductsOrder.forEach(name => {
                const sizesArr = mergedProductsMap[name];
                if (sizesArr.length > 0) {
                    colText += `- ${name} ${sizesArr.join(', ')}\n`;
                    colLabelProducts.push(`${name} ${sizesArr.join(', ')}`);
                }
            });

            if (colText !== '') {
                if (colName !== '') finalProductsText += `${colName}\n${colText}\n`;
                else finalProductsText += `${colText}\n`;
            }

            if (colLabelProducts.length > 0) {
                if (colName !== '') labelLines.push(`${colName} = ${colLabelProducts.join(' / ')}`);
                else labelLines.push(colLabelProducts.join(' / '));
            }
        });
        
        if (finalProductsText === '') finalProductsText = '- ไม่มีรายการสินค้า -\n\n';

        let priceString = '';
        if (validPrices.length > 0) {
            const totalSum = hasMissingPrice ? '***' : (productsSum + shippingValue); 
            if (shippingValue > 0) priceString = `${validPrices.join(' + ')} + ${shippingValue} = ${totalSum}`;
            else priceString = `${validPrices.join(' + ')} = ${totalSum}`;
        } else {
            if (hasMissingPrice) {
                 const totalSum = '***';
                 if (shippingValue > 0) priceString = `*** + ${shippingValue} = ${totalSum}`;
                 else priceString = `*** = ***`;
            } else {
                if (shippingValue > 0) priceString = `${shippingValue} = ${shippingValue}`;
                else priceString = '0 = 0';
            }
        }

        const bankRadios = document.getElementsByName('bank');
        let bankText = '';
        for (const radio of bankRadios) {
            if (radio.checked) {
                if (radio.value === 'TTB') bankText = "ธ.ไทยธนชาต TTB\n622-2-84950-4\nกุลจิรา ล้อพงศ์ไพบูลย์";
                else if (radio.value === 'SCB') bankText = "ธ.ไทยพาณิชย์ SCB\n407-811653-8\nกุลจิรา ตู้จินดา";
                else if (radio.value === 'KBANK') bankText = "ธ.กสิกร KBANK\n026-1-56003-8\nกุลจิรา ตู้จินดา";
                else if (radio.value === 'GSB') bankText = "ธ.ออมสิน GSB\n020478034752\nกุลจิรา ล้อพงศ์ไพบูลย์";
            }
        }

        const finalOutput = `${finalProductsText}ค่าจัดส่ง: ${shipping} บาท
ยอดรวม: ${priceString} บาท

--------------------------
ชำระเงินได้ที่:
${bankText}

โอนเงินแล้วกรุณาส่งสลิป และที่อยู่ให้ด้วยนะคะ`;
        document.getElementById('outputText').value = finalOutput;
        document.getElementById('outputLabelText').value = labelLines.join('\n');
    }

    function copyText(elementId) {
        const outputArea = document.getElementById(elementId);
        if(outputArea.value.trim() === '') return;
        outputArea.select();
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
    }
</script>
