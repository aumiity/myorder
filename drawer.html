<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; padding: 2rem; padding-bottom: 100px; }
        
        .mock-collection { max-width: 800px; height: 250px; background: #1e1e1e; border-radius: 16px; margin: 0 auto 2rem auto; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #666; }
        
        /* ปุ่มลอยมุมขวาล่าง (FAB) */
        .fab-btn { position: fixed; bottom: 30px; right: 30px; background: #0A84FF; color: white; border: none; border-radius: 30px; padding: 1rem 2rem; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(0,132,255,0.4); z-index: 100; transition: transform 0.2s; }
        .fab-btn:hover { transform: scale(1.05); }

        /* แผงสไลด์ด้านขวา (Drawer) ซ่อนไว้ก่อน */
        .drawer { position: fixed; top: 0; right: -450px; width: 400px; height: 100vh; background: #1e1e1e; box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 200; transition: right 0.3s ease; padding: 2rem; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; }
        .drawer.open { right: 0; }
        
        /* ฉากดำมืดตอนเปิด Drawer */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(4px); }
        .overlay.show { display: block; }
        
        .close-btn { align-self: flex-end; background: transparent; color: white; border: none; font-size: 1.5rem; cursor: pointer; margin-bottom: 1rem; }
        .mock-box { background: #2d2d2d; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px dashed #444; }
        .mock-textarea { width: 100%; height: 200px; background: #111; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">หน้าจอเน้นแสดงคอลเลคชั่น (สะอาดตา)</h2>
    <div class="mock-collection">คอลเลคชั่นที่ 1</div>
    <div class="mock-collection">คอลเลคชั่นที่ 2</div>
    <div class="mock-collection">คอลเลคชั่นที่ 3</div>

    <button class="fab-btn" onclick="toggleDrawer()">📋 สรุปยอด & ตั้งค่า</button>

    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>

    <div class="drawer" id="drawer">
        <button class="close-btn" onclick="toggleDrawer()">✖</button>
        <h2 style="margin-top:0;">สรุปยอดโอน</h2>
        <div class="mock-box">ตั้งค่าการจัดส่ง / ธนาคาร</div>
        <div class="mock-box" style="flex:1;">
            ข้อความเตรียมก๊อปปี้
            <div class="mock-textarea"></div>
        </div>
        <button style="background: #32D74B; color:white; border:none; padding:1rem; border-radius:12px; font-size:1rem; cursor:pointer;">คัดลอกสรุปยอด</button>
    </div>

    <script>
        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
    </script>
</body>
</html>
