<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Management - Shopify Classic</title>
    <style>
        :root {
            /* สีแบบ Shopify Classic Checkout (อ้างอิงจากรูป) */
            --bg-left: #FFFFFF;       /* ซ้ายขาวล้วน */
            --bg-right: #FAFAFA;      /* ขวาเทาอ่อน */
            --border: #D9D9D9;        /* ขอบเทาอ่อน */
            --border-dark: #C9C9C9;
            
            --text-main: #333333;     /* ดำเทา */
            --text-muted: #737373;    /* เทากลาง */
            
            /* สีปุ่มฟ้าอ้างอิงจากปุ่ม Review order */
            --primary: #1773B0; 
            --primary-hover: #135d8e;
            --primary-bg-light: #F0F5F8; /* สีพื้นหลังตอน Active */
            
            --danger: #DD4B39;
            --success: #008060;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; color: var(--text-main); 
            display: flex; min-height: 100vh;
            background-color: var(--bg-left);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #D9D9D9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #C9C9C9; }

        /* ======================================= */
        /* ฝั่งซ้าย: พื้นที่เพิ่มสินค้า (55%) */
        /* ======================================= */
        .left-panel {
            flex: 1.3; 
            background-color: var(--bg-left);
            padding: 50px 8% 80px 10%;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .header-logo { font-size: 1.7rem; font-weight: normal; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; color: #000;}
        
        .section-title { font-size: 1.25rem; font-weight: normal; margin-top: 40px; margin-bottom: 15px; color: #333;}

        /* Input แบบ Shopify */
        input[type="text"], input[type="number"]:not(.inline-fee-input) {
            width: 100%; background: #FFFFFF; border: 1px solid var(--border);
            padding: 13px 12px; border-radius: 5px; color: var(--text-main); font-size: 0.95rem;
            box-sizing: border-box; transition: 0.2s; font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
        input::placeholder { color: #999; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* ======================================= */
        /* Collection & Products */
        /* ======================================= */
        .collection-block { margin-bottom: 30px; background: #FFFFFF; border-radius: 5px; border: 1px solid var(--border); transition: 0.3s; }
        
        .collection-header { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border); background: #FAFAFA; border-top-left-radius: 5px; border-top-right-radius: 5px;}
        .collection-block.collapsed .collection-header { border-bottom: none; border-radius: 5px; }
        .collection-block.collapsed .collection-body { display: none; }
        
        .collection-name-box { flex-grow: 1; margin: 0 15px; }
        .collection-name-box input { background: transparent; border: 1px solid transparent; padding: 6px; font-size: 1.05rem; font-weight: 500; }
        .collection-name-box input:focus { background: white; border: 1px solid var(--primary); }
        
        .mac-controls { display: flex; gap: 6px; }
        .mac-btn { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; background-color: var(--border-dark); }
        .mac-btn:hover.mac-close { background-color: var(--danger); }
        .mac-btn:hover.mac-min, .mac-btn:hover.mac-max { background-color: var(--text-muted); }
        
        .btn-toggle-col { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; width: 28px; height: 28px; transition: 0.2s;}
        .btn-toggle-col:hover { background: var(--border); color: var(--text-main); }
        .collection-block.collapsed .btn-toggle-col { transform: rotate(-90deg); }

        .collection-body { padding: 15px; }

        /* สินค้าย่อย */
        .product-item { background: #FFFFFF; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.02);}
        .product-header-row { display: grid; grid-template-columns: 1fr 100px 80px auto; gap: 10px; margin-bottom: 10px; }
        
        /* ปุ่มตัวเลือกไซส์ */
        .option-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #F0F0F0; }
        .size-pills { display: flex; flex-wrap: wrap; gap: 8px; flex: 1;}
        .pill { padding: 6px 12px; border-radius: 4px; background: #FFFFFF; color: var(--text-main); font-size: 0.85rem; border: 1px solid var(--border); cursor: pointer; user-select: none; transition: 0.2s;}
        .pill:hover { border-color: var(--text-muted); }
        .pill.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ปุ่มต่างๆ */
        .btn { background: var(--primary); color: white; border: none; padding: 18px 24px; border-radius: 5px; font-weight: 500; font-size: 1rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-sizing: border-box;}
        .btn:hover { background: var(--primary-hover); }
        .btn-outline { background: white; border: 1px solid var(--border-dark); color: var(--text-main); padding: 12px 20px;}
        .btn-outline:hover { border-color: var(--text-main); }
        .btn-text { background: transparent; color: var(--primary); border: none; font-weight: normal; font-size: 0.9rem; cursor: pointer; padding: 5px 0; }
        .btn-text:hover { color: var(--primary-hover); }
        
        .icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .icon-btn:hover { background: #F5F5F5; color: var(--text-main); }

        /* ======================================= */
        /* การตั้งค่า (สไตล์ Payment ของ Shopify) */
        /* ======================================= */
        .setting-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        
        /* ธนาคารแบบ กล่องติดกัน (Radio) */
        .bank-list { display: flex; flex-direction: column; background: #FFFFFF; border-radius: 5px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px;}
        .bank-item-label { display: block; position: relative; cursor: pointer; border-bottom: 1px solid var(--border); margin-bottom: -1px; }
        .bank-item-label:last-child { border-bottom: none; }
        
        .bank-item-content { display: flex; align-items: center; gap: 15px; padding: 15px; background: #FFFFFF; transition: 0.2s; border: 1px solid transparent; border-radius: 5px;}
        .bank-radio { appearance: none; width: 18px; height: 18px; border: 1px solid var(--border-dark); border-radius: 50%; margin: 0; outline: none; cursor: pointer; position: relative; background: #fff; flex-shrink: 0;}
        .bank-radio:checked { border-color: var(--primary); border-width: 6px; background: white; }
        
        /* เมื่อถูกเลือก ให้กล่องเป็นสีฟ้าอ่อนแบบ Shopify */
        .bank-item-label input:checked + .bank-item-content {
            background-color: var(--primary-bg-light);
            border-color: var(--primary);
            z-index: 1; /* ดันขอบขึ้นมาทับเส้นอื่น */
        }
        .bank-text-info { font-size: 0.95rem; color: var(--text-main); flex: 1; line-height: 1.4;}

        /* Checkbox แบบคลีน */
        .custom-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-main); font-size: 0.95rem;}
        .custom-checkbox input { display: none; }
        .checkmark { width: 18px; height: 18px; border: 1px solid var(--border-dark); border-radius: 4px; display: flex; align-items: center; justify-content: center; background: white; transition: 0.2s;}
        .custom-checkbox input:checked ~ .checkmark { background: var(--primary); border-color: var(--primary); }
        .custom-checkbox input:checked ~ .checkmark::after { content: '✔'; color: white; font-size: 12px; }

        /* ======================================= */
        /* ฝั่งขวา: สรุปยอด (45%) Sticky */
        /* ======================================= */
        .right-panel {
            flex: 1; 
            background-color: var(--bg-right);
            padding: 50px 8% 50px 5%;
            box-sizing: border-box;
            border-left: 1px solid var(--border);
            position: relative; 
        }

        .sticky-summary { position: sticky; top: 50px; display: flex; flex-direction: column; }

        /* บิลจำลองแบบ Shopify เป๊ะๆ */
        .visual-bill-container { margin-bottom: 20px; }

        .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; font-size: 0.95rem;}
        .product-line { border-bottom: none; } /* สินค้าไม่มีเส้นขอบกั้นใน Shopify */
        
        .thumbnail { width: 64px; height: 64px; background: #FFFFFF; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); position: relative; display: flex; align-items: center; justify-content: center;}
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px;}
        .qty-badge { position: absolute; top: -10px; right: -10px; background: rgba(114, 114, 114, 0.9); color: white; font-size: 0.8rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;}
        
        .cost-line { border-top: 1px solid var(--border); padding: 15px 0; display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-main);}
        .cost-line.total-line { border-top: 1px solid var(--border); align-items: center; padding-top: 20px; font-size: 1rem;}

        /* ======================================= */
        /* ระบบ Tabs สำหรับข้อความ */
        /* ======================================= */
        .tabs-header { display: flex; gap: 20px; margin-top: 30px; margin-bottom: 10px;}
        .tab-btn { background: transparent; border: none; padding: 5px 0; font-size: 0.9rem; color: var(--primary); cursor: pointer; border-bottom: 1px solid transparent; transition: 0.2s;}
        .tab-btn:hover { color: var(--primary-hover); }
        .tab-btn.active { color: var(--text-main); font-weight: 500; cursor: default;}

        .tab-content { display: none; flex-direction: column; flex: 1; }
        .tab-content.active { display: flex; }

        textarea.final-output { width: 100%; min-height: 120px; background: #FFFFFF; border: 1px solid var(--border); border-radius: 5px; padding: 12px; font-family: monospace; font-size: 0.85rem; color: var(--text-main); resize: vertical; box-sizing: border-box;}

        /* ======================================= */
        /* Mobile Layout */
        /* ======================================= */
        .mobile-summary-toggle { display: none; }

        @media (max-width: 1024px) {
            body { flex-direction: column; }
            
            .left-panel { padding: 20px 5%; order: 2; flex: none; }
            .right-panel { padding: 0; order: 1; flex: none; border-left: none; border-bottom: 1px solid var(--border); }

            .mobile-summary-toggle {
                display: flex; justify-content: space-between; align-items: center;
                background-color: var(--bg-right); padding: 20px 5%; cursor: pointer;
                color: var(--primary); font-size: 0.95rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            }

            .sticky-summary { position: static; padding: 20px 5%; display: none; height: auto; }
            .sticky-summary.show { display: block; border-bottom: 1px solid var(--border);}

            .product-header-row { grid-template-columns: 1fr 90px 70px; grid-template-rows: auto auto; }
            .productName { grid-column: 1 / 4; grid-row: 1; } 
            .productPrice { grid-column: 1 / 2; grid-row: 2; } 
            .productQty { grid-column: 2 / 3; grid-row: 2; } 
            .product-actions { grid-column: 3 / 4; grid-row: 2; justify-content: flex-end; } 
            
            .setting-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main class="left-panel">
        <div class="header-logo">
            <span>Kenergy <span style="font-size:0.8rem; color:var(--text-muted); font-weight:normal;">v12.0 (Classic)</span></span>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 class="section-title" style="margin:0;">ตะกร้าสินค้า</h2>
            <button class="btn-text" onclick="clearAllPills()">ล้างตัวเลือกทั้งหมด</button>
        </div>

        <div id="collectionsContainer"></div>

        <button class="btn-text" style="width: 100%; text-align: left; margin-bottom: 40px;" onclick="addCollectionBlock()">
            + เพิ่มคอลเลคชั่นใหม่
        </button>

        <h2 class="section-title">การตั้งค่าค่าใช้จ่าย</h2>
        <div class="setting-grid">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="custom-checkbox">
                    <input type="checkbox" id="check_shipping" onchange="updateData()" checked>
                    <span class="checkmark"></span> ค่าจัดส่ง
                </label>
                <input type="number" id="val_shipping" placeholder="ราคาจัดส่ง" value="50" oninput="updateData()">
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="custom-checkbox">
                    <input type="checkbox" id="check_special" onchange="updateData()">
                    <span class="checkmark"></span> พื้นที่พิเศษ
                </label>
                <input type="number" id="val_special" placeholder="ราคาพิเศษ" value="50" oninput="updateData()">
            </div>
            <div style="grid-column: 1 / -1; display: flex; align-items: center; gap: 10px;">
                <label class="custom-checkbox" style="min-width: 80px;">
                    <input type="checkbox" id="check_deposit" onchange="updateData()">
                    <span class="checkmark"></span> หักมัดจำ
                </label>
                <input type="number" id="val_deposit" placeholder="ยอดมัดจำ" value="100" oninput="updateData()">
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h2 class="section-title" style="margin-bottom: 15px;">บัญชีธนาคาร (Payment)</h2>
            <div style="margin-bottom: 15px;">
                <button class="btn-text" onclick="addBank()" style="margin-right: 15px;">เพิ่ม</button>
                <button class="btn-text" style="color:var(--text-muted);" onclick="editBankList()">จัดการ</button>
            </div>
        </div>
        
        <div class="bank-list" id="bankContainer">
            </div>

        <div style="display: flex; gap: 10px; margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border);">
            <button class="btn-outline btn" style="flex: 1;" onclick="exportData()">ส่งออกข้อมูล</button>
            <button class="btn-outline btn" style="flex: 1;" onclick="importData()">นำเข้าข้อมูล</button>
        </div>

    </main>


    <aside class="right-panel">
        <div class="mobile-summary-toggle" onclick="toggleMobileSummary()">
            <span id="toggle-text" style="display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 19.5c0 .829-.672 1.5-1.5 1.5s-1.5-.671-1.5-1.5c0-.828.672-1.5 1.5-1.5s1.5.672 1.5 1.5zm3.5-1.5c-.828 0-1.5.671-1.5 1.5s.672 1.5 1.5 1.5 1.5-.671 1.5-1.5c0-.828-.672-1.5-1.5-1.5zm1.336-5l1.977-7h-16.813l2.938 7h11.9zm3.164-9l-2.731 9.614c-.179.629-.757 1.052-1.411 1.052h-10.742c-.653 0-1.231-.423-1.411-1.052l-3.21-11.614h-2.995v-2h4.522l.536 1.936h17.442z"/></svg>
                <span>แสดงสรุปยอดโอน ▾</span>
            </span>
            <span id="mobile-total-price" style="color:var(--text-main); font-weight:500;">฿0.00</span>
        </div>

        <div class="sticky-summary" id="summary-box">
            
            <div class="visual-bill-container" id="visual-bill">
                </div>

            <div>
                <div class="cost-line" style="border-top: 1px solid var(--border);">
                    <span style="color: var(--text-muted);">Subtotal</span>
                    <span id="display-subtotal" style="font-weight: 500;">฿0.00</span>
                </div>
                <div class="cost-line" id="display-shipping-row" style="border-top: none; padding-top: 0;">
                    <span style="color: var(--text-muted);">Shipping</span>
                    <span id="display-shipping" style="font-weight: 500;">฿0.00</span>
                </div>
                <div class="cost-line" id="display-deposit-row" style="border-top: none; padding-top: 0; display:none;">
                    <span style="color: var(--text-muted);">Deposit</span>
                    <span id="display-deposit" style="font-weight: 500;">-฿0.00</span>
                </div>
                
                <div class="cost-line total-line">
                    <span style="font-size: 1.1rem;">Total</span>
                    <div style="display:flex; align-items:baseline; gap:8px;">
                        <span style="color: var(--text-muted); font-size: 0.8rem;">THB</span>
                        <span id="display-total" style="font-size: 1.4rem; font-weight: 600;">฿0.00</span>
                    </div>
                </div>
            </div>

            <button class="btn" style="margin-top: 20px;" onclick="copyText('outputText')">Review order (คัดลอกสรุปยอด)</button>

            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('tab-customer')">ข้อความส่งลูกค้า</button>
                <button class="tab-btn" onclick="switchTab('tab-label')">ใบปะหน้า</button>
            </div>

            <div id="tab-customer" class="tab-content active">
                <textarea id="outputText" class="final-output" readonly placeholder="ข้อความสรุปยอดจะแสดงที่นี่..."></textarea>
            </div>

            <div id="tab-label" class="tab-content">
                <textarea id="outputLabelText" class="final-output" readonly placeholder="ข้อความใบปะหน้าจะแสดงที่นี่..."></textarea>
            </div>

        </div>
    </aside>

<script>
    const ICON_CHEV_DOWN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    const ICON_UP = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
    const ICON_DOWN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
    const ICON_TRASH = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
    const ICON_COPY = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_DOTS = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>`;

    let defaultBanks = [{id: 'b1', text: 'Credit card / กสิกรไทย\n123-4-56789-0\nนาย สมชาย ขายดี'}];

    window.onload = function() {
        renderBanks(); 
        loadData();
        updateData(); 
    };

    function toggleMobileSummary() {
        const box = document.getElementById('summary-box');
        const txt = document.getElementById('toggle-text');
        box.classList.toggle('show');
        if(box.classList.contains('show')) {
            txt.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 19.5c0 .829-.672 1.5-1.5 1.5s-1.5-.671-1.5-1.5c0-.828.672-1.5 1.5-1.5s1.5.672 1.5 1.5zm3.5-1.5c-.828 0-1.5.671-1.5 1.5s.672 1.5 1.5 1.5 1.5-.671 1.5-1.5c0-.828-.672-1.5-1.5-1.5zm1.336-5l1.977-7h-16.813l2.938 7h11.9zm3.164-9l-2.731 9.614c-.179.629-.757 1.052-1.411 1.052h-10.742c-.653 0-1.231-.423-1.411-1.052l-3.21-11.614h-2.995v-2h4.522l.536 1.936h17.442z"/></svg><span>ซ่อนสรุปยอดโอน ▴</span>`;
        } else {
            txt.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 19.5c0 .829-.672 1.5-1.5 1.5s-1.5-.671-1.5-1.5c0-.828.672-1.5 1.5-1.5s1.5.672 1.5 1.5zm3.5-1.5c-.828 0-1.5.671-1.5 1.5s.672 1.5 1.5 1.5 1.5-.671 1.5-1.5c0-.828-.672-1.5-1.5-1.5zm1.336-5l1.977-7h-16.813l2.938 7h11.9zm3.164-9l-2.731 9.614c-.179.629-.757 1.052-1.411 1.052h-10.742c-.653 0-1.231-.423-1.411-1.052l-3.21-11.614h-2.995v-2h4.522l.536 1.936h17.442z"/></svg><span>แสดงสรุปยอดโอน ▾</span>`;
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // ==========================================
    // ส่วนธนาคาร (Radio กล่องติดกันแบบ Shopify)
    // ==========================================
    function renderBanks() {
        let banks = JSON.parse(localStorage.getItem('bankDataV12')) || defaultBanks;
        const container = document.getElementById('bankContainer');
        let selectedId = localStorage.getItem('bankV12');
        
        container.innerHTML = '';
        if(banks.length === 0) {
            container.innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem; padding:15px;">ยังไม่มีบัญชีธนาคาร</div>';
            return;
        }

        if (!banks.find(b => b.id === selectedId)) selectedId = banks[0].id;

        banks.forEach(b => {
            const isChecked = b.id === selectedId ? 'checked' : '';
            const html = `
                <label class="bank-item-label">
                    <input type="radio" class="bank-radio" style="display:none;" name="bankSelect" value="${b.id}" ${isChecked} onchange="updateData()">
                    <div class="bank-item-content">
                        <div class="bank-radio" style="${isChecked ? 'border-color:var(--primary); border-width:6px; background:white;' : ''}"></div>
                        <div class="bank-text-info">
                            <strong style="display:block;">${b.text.split('\n')[0]}</strong>
                            <span style="color:var(--text-muted); font-size:0.85rem;">${b.text.split('\n').slice(1).join(' - ')}</span>
                        </div>
                    </div>
                </label>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
        
        // ผูก Event ให้ CSS Custom Radio เปลี่ยนรูปร่างตอนกด
        document.querySelectorAll('.bank-item-label input').forEach(input => {
            input.addEventListener('change', function() {
                document.querySelectorAll('.bank-item-content .bank-radio').forEach(r => { r.style.borderColor = 'var(--border-dark)'; r.style.borderWidth = '1px'; });
                if(this.checked) {
                    const customRadio = this.nextElementSibling.querySelector('.bank-radio');
                    customRadio.style.borderColor = 'var(--primary)';
                    customRadio.style.borderWidth = '6px';
                    customRadio.style.background = 'white';
                }
            });
        });
    }

    function addBank() {
        const input = prompt("🏦 เพิ่มข้อมูลบัญชีใหม่\n(พิมพ์ // เพื่อบังคับขึ้นบรรทัดใหม่):");
        if (input && input.trim()) {
            let banks = JSON.parse(localStorage.getItem('bankDataV12')) || defaultBanks;
            let newId = 'b' + Date.now();
            banks.push({ id: newId, text: input.split('//').map(s => s.trim()).join('\n') });
            localStorage.setItem('bankDataV12', JSON.stringify(banks));
            localStorage.setItem('bankV12', newId);
            renderBanks(); updateData();
        }
    }

    function editBankList() {
        let banks = JSON.parse(localStorage.getItem('bankDataV12')) || defaultBanks;
        const selectedNode = document.querySelector('input[name="bankSelect"]:checked');
        if(!selectedNode) { alert('กรุณาเลือกธนาคารที่ต้องการแก้ไขก่อน'); return;}
        
        let selectedId = selectedNode.value;
        let bank = banks.find(b => b.id === selectedId);
        if(bank) {
            const input = prompt("✏️ แก้ไขข้อมูลบัญชี (พิมพ์ // ขึ้นบรรทัดใหม่)\n🚨 ลบข้อความทั้งหมดเพื่อลบบัญชีนี้:", bank.text.split('\n').join(' // '));
            if (input !== null) {
                if (input.trim() === '') banks = banks.filter(b => b.id !== selectedId);
                else bank.text = input.split('//').map(s => s.trim()).join('\n');
                localStorage.setItem('bankDataV12', JSON.stringify(banks));
                renderBanks(); updateData();
            }
        }
    }

    // ==========================================
    // ส่วน Core Logic
    // ==========================================
    function saveData() {
        localStorage.setItem('val_shipping', document.getElementById('val_shipping').value);
        localStorage.setItem('val_special', document.getElementById('val_special').value);
        localStorage.setItem('val_deposit', document.getElementById('val_deposit').value);
        localStorage.setItem('check_shipping', document.getElementById('check_shipping').checked);
        localStorage.setItem('check_special', document.getElementById('check_special').checked);
        localStorage.setItem('check_deposit', document.getElementById('check_deposit').checked);
        
        const selectedBankNode = document.querySelector('input[name="bankSelect"]:checked');
        if(selectedBankNode) localStorage.setItem('bankV12', selectedBankNode.value);

        const collections = [];
        document.querySelectorAll('.collection-block').forEach(block => {
            const colName = block.querySelector('.collectionName').value;
            const isCollapsed = block.classList.contains('collapsed');
            const products = [];
            block.querySelectorAll('.product-item').forEach(item => {
                const name = item.querySelector('.productName').value;
                const price = item.querySelector('.productPrice').value;
                const qty = item.querySelector('.productQty').value;
                const optionRows = [];
                item.querySelectorAll('.option-row').forEach(rowEl => {
                    const availableSizes = []; const selectedSizes = [];
                    rowEl.querySelectorAll('.pill[data-size]').forEach(pill => {
                        const size = pill.getAttribute('data-size');
                        availableSizes.push(size);
                        if (pill.classList.contains('active')) selectedSizes.push(size);
                    });
                    optionRows.push({ availableSizes, selectedSizes });
                });
                products.push({ name, price, qty, optionRows });
            });
            collections.push({ colName, isCollapsed, products });
        });
        localStorage.setItem('orderDataV12', JSON.stringify(collections));
    }

    function loadData() {
        if (localStorage.getItem('val_shipping')) document.getElementById('val_shipping').value = localStorage.getItem('val_shipping');
        if (localStorage.getItem('val_special')) document.getElementById('val_special').value = localStorage.getItem('val_special');
        if (localStorage.getItem('val_deposit')) document.getElementById('val_deposit').value = localStorage.getItem('val_deposit');

        ['shipping', 'special', 'deposit'].forEach(id => {
            let savedState = localStorage.getItem('check_' + id);
            let checkbox = document.getElementById('check_' + id);
            if (savedState === 'false') checkbox.checked = false;
            else if (savedState === 'true') checkbox.checked = true;
            else checkbox.checked = (id === 'shipping');
        });

        const container = document.getElementById('collectionsContainer');
        container.innerHTML = ''; 
        let savedData = JSON.parse(localStorage.getItem('orderDataV12'));
        
        if (savedData && savedData.length > 0) {
            savedData.forEach(col => {
                const block = addCollectionBlock(col.colName, col.isCollapsed);
                if(col.products.length > 0) {
                    col.products.forEach(p => block.querySelector('.productList').appendChild(createProductItemElement(p.name, p.price, p.qty, p.optionRows)));
                } else block.querySelector('.productList').appendChild(createProductItemElement()); 
            });
        } 
    }

    // ==========================================
    // ส่วนแสดงผล
    // ==========================================
    function updateData() {
        saveData();
        generateOutput();
    }

    function generateOutput() {
        const ship = document.getElementById('check_shipping').checked ? parseFloat(document.getElementById('val_shipping').value)||0 : 0;
        const spec = document.getElementById('check_special').checked ? parseFloat(document.getElementById('val_special').value)||0 : 0;
        const dep = document.getElementById('check_deposit').checked ? parseFloat(document.getElementById('val_deposit').value)||0 : 0;

        let finalProductsText = '', labelLines = [], validPrices = [], hasMissingPrice = false, productsSum = 0;
        let visualBillHtml = ''; 
        let hasItem = false;

        document.querySelectorAll('.collection-block').forEach(block => {
            const colName = block.querySelector('.collectionName').value.trim();
            let colText = '', colLabelProducts = [], mergedMap = {}, orderArr = [];
            
            block.querySelectorAll('.product-item').forEach(item => {
                const nameVal = item.querySelector('.productName').value.trim();
                const rawPrice = item.querySelector('.productPrice').value.trim();
                const qtyVal = parseInt(item.querySelector('.productQty').value.trim()) || 1; 
                const rowEls = item.querySelectorAll('.option-row');
                
                if (rowEls.length === 0 || (rowEls.length === 1 && rowEls[0].querySelector('.pill.active[data-size="-"]'))) {
                    if (nameVal !== '' && !item.querySelector('.pill.active:not([data-size="-"])')) {
                        hasItem = true;
                        if (!mergedMap[nameVal]) { mergedMap[nameVal] = []; orderArr.push(nameVal); }
                        mergedMap[nameVal].push(qtyVal > 1 ? `x${qtyVal}` : '');
                        
                        let priceText = '***';
                        if (rawPrice === '') { validPrices.push('***'); hasMissingPrice = true; } 
                        else { 
                            let p = parseFloat(rawPrice); validPrices.push(qtyVal > 1 ? `${p}x${qtyVal}` : p); productsSum += (p * qtyVal); 
                            priceText = `฿${(p * qtyVal).toFixed(2)}`;
                        }
                        
                        visualBillHtml += `<div class="summary-item product-line">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div class="thumbnail"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg><div class="qty-badge">${qtyVal}</div></div>
                                <div><div style="font-weight:500; color:var(--text-main);">${nameVal}</div><div style="font-size:0.8rem; color:var(--text-muted);">${colName}</div></div>
                            </div>
                            <span style="font-weight:500; font-size:0.9rem;">${priceText}</span>
                        </div>`;
                    }
                } else {
                    let textParts = [], maxActive = 0;
                    rowEls.forEach(r => {
                        const actives = r.querySelectorAll('.pill.active');
                        maxActive = Math.max(maxActive, actives.length);
                        if (actives.length > 0) textParts.push(Array.from(actives).map(p=>p.getAttribute('data-size')).filter(s=>s!=='-').join(','));
                    });
                    if (nameVal !== '' && maxActive > 0) {
                        hasItem = true;
                        if (!mergedMap[nameVal]) { mergedMap[nameVal] = []; orderArr.push(nameVal); }
                        let token = textParts.length > 0 ? `(${textParts.join(' ')})` : '';
                        if (qtyVal > 1) token += (token ? ` x${qtyVal}` : `x${qtyVal}`);
                        mergedMap[nameVal].push(token);
                        
                        let priceText = '***';
                        if (rawPrice === '') { for(let i=0; i<maxActive; i++) validPrices.push('***'); hasMissingPrice = true; } 
                        else { 
                            let p = parseFloat(rawPrice); 
                            for(let i=0; i<maxActive; i++) { validPrices.push(qtyVal > 1 ? `${p}x${qtyVal}` : p); productsSum += (p * qtyVal); } 
                            priceText = `฿${(p * maxActive * qtyVal).toFixed(2)}`;
                        }

                        visualBillHtml += `<div class="summary-item product-line">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div class="thumbnail"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg><div class="qty-badge">${maxActive * qtyVal}</div></div>
                                <div><div style="font-weight:500; color:var(--text-main);">${nameVal}</div><div style="font-size:0.8rem; color:var(--text-muted);">${colName} ${textParts.length > 0 ? `(${textParts.join(' ')})` : ''}</div></div>
                            </div>
                            <span style="font-weight:500; font-size:0.9rem;">${priceText}</span>
                        </div>`;
                    }
                }
            });

            orderArr.forEach(name => {
                const sizes = mergedMap[name].filter(s=>s).join(', ');
                colText += sizes ? `- ${name} ${sizes}\n` : `- ${name}\n`;
                colLabelProducts.push(sizes ? `${name} ${sizes}` : name);
            });

            if (colText) finalProductsText += (colName ? `${colName}\n` : '') + colText + '\n';
            if (colLabelProducts.length) labelLines.push(colName ? `${colName} = ${colLabelProducts.join(' / ')}` : colLabelProducts.join(' / '));
        });

        if(!hasItem) visualBillHtml = '<div style="text-align:center; color:var(--text-muted); margin: 20px 0; font-size:0.9rem;">ยังไม่มีสินค้าในออเดอร์นี้</div>';
        
        document.getElementById('visual-bill').innerHTML = visualBillHtml;

        // คำนวณยอดเงิน Visual
        document.getElementById('display-subtotal').innerText = hasMissingPrice ? '***' : `฿${productsSum.toFixed(2)}`;
        
        let totalShipping = ship + spec;
        if(totalShipping > 0) {
            document.getElementById('display-shipping-row').style.display = 'flex';
            document.getElementById('display-shipping').innerText = `฿${totalShipping.toFixed(2)}`;
        } else {
            document.getElementById('display-shipping-row').style.display = 'none';
        }

        if(dep > 0) {
            document.getElementById('display-deposit-row').style.display = 'flex';
            document.getElementById('display-deposit').innerText = `-฿${dep.toFixed(2)}`;
        } else {
            document.getElementById('display-deposit-row').style.display = 'none';
        }

        let netTotal = productsSum + totalShipping - dep;
        let displayTotalText = hasMissingPrice ? '***' : `฿${netTotal.toFixed(2)}`;
        document.getElementById('display-total').innerText = displayTotalText;
        document.getElementById('mobile-total-price').innerText = displayTotalText;

        // สร้างข้อความ Text
        let terms = hasMissingPrice ? ['***'] : [...validPrices];
        if (ship > 0) terms.push(ship);
        if (spec > 0) terms.push(spec);

        let pStr = '';
        if (hasMissingPrice) {
            pStr = terms.length > 1 ? terms.join(' + ') : terms[0]||'***';
            if (dep > 0) pStr += ` - ${dep}`;
            pStr += ' = ***';
        } else {
            pStr = terms.length > 0 ? (terms.length > 1 ? terms.join(' + ') : terms[0]) : (dep > 0 ? '0' : '0');
            if (dep > 0) pStr += ` - ${dep}`;
            pStr += ` = ${netTotal}`;
        }

        let breakdown = (ship > 0 ? `ค่าจัดส่ง: ${ship} บาท\n` : '') + (spec > 0 ? `พื้นที่พิเศษ: ${spec} บาท\n` : '') + (dep > 0 ? `หักมัดจำ: -${dep} บาท\n` : '');
        
        let bankId = localStorage.getItem('bankV12'), bankText = "(กรุณาเลือกบัญชีธนาคาร)";
        if (bankId) { let b = (JSON.parse(localStorage.getItem('bankDataV12'))||defaultBanks).find(x=>x.id===bankId); if(b) bankText = b.text; }

        document.getElementById('outputText').value = !finalProductsText ? '- ไม่มีรายการสินค้า -\n\n' : `${finalProductsText}${breakdown}ยอดรวม: ${pStr} บาท\n\n--------------------------\nชำระเงินได้ที่:\n${bankText}\n\nโอนเงินแล้วกรุณาส่งสลิป และที่อยู่ให้ด้วยนะคะ`;
        document.getElementById('outputLabelText').value = labelLines.join('\n');
    }

    // ==========================================
    // ส่วนเพิ่ม/ลบ UI Elements
    // ==========================================
    function toggleCollection(btn) { btn.closest('.collection-block').classList.toggle('collapsed'); saveData(); }

    function addCollectionBlock(colName = '', isCollapsed = false) {
        const container = document.getElementById('collectionsContainer');
        const block = document.createElement('div');
        block.className = 'collection-block';
        if(isCollapsed) block.classList.add('collapsed');
        block.innerHTML = `
            <div class="collection-header">
                <div class="mac-controls">
                    <button class="mac-btn mac-close" title="ลบ" onclick="removeCollectionBlock(this)"></button>
                    <button class="mac-btn mac-min" title="ขึ้น" onclick="moveCollectionUp(this)"></button>
                    <button class="mac-btn mac-max" title="ลง" onclick="moveCollectionDown(this)"></button>
                </div>
                <div class="collection-name-box">
                    <input type="text" class="collectionName" placeholder="ชื่อคอลเลคชั่น..." value="${colName}" oninput="updateData()">
                </div>
                <button class="btn-toggle-col" onclick="toggleCollection(this)">${ICON_CHEV_DOWN}</button>
            </div>
            <div class="collection-body">
                <div class="productList"></div>
                <button class="btn-outline btn" style="margin-top:15px; width:100%;" onclick="handleAddProductClick(this)">+ เพิ่มสินค้า</button>
            </div>
        `;
        container.appendChild(block);
        if(colName === '') { block.querySelector('.productList').appendChild(createProductItemElement()); updateData(); }
        return block;
    }

    function removeCollectionBlock(btn) { if(confirm('❌ ลบคอลเลคชั่นนี้?')) { btn.closest('.collection-block').remove(); updateData(); } }
    function moveCollectionUp(btn) { const b = btn.closest('.collection-block'); if (b.previousElementSibling) { b.parentNode.insertBefore(b, b.previousElementSibling); updateData(); } }
    function moveCollectionDown(btn) { const b = btn.closest('.collection-block'); if (b.nextElementSibling) { b.parentNode.insertBefore(b.nextElementSibling, b); updateData(); } }
    
    function clearAllPills() { document.querySelectorAll('.pill.active').forEach(p => p.classList.remove('active')); document.querySelectorAll('.productQty').forEach(q => q.value = 1); ['special', 'deposit'].forEach(id => document.getElementById('check_' + id).checked = false); updateData(); }
    function handleAddProductClick(btn) { btn.previousElementSibling.appendChild(createProductItemElement()); updateData(); }
    function moveProductUp(btn) { const i = btn.closest('.product-item'); if (i.previousElementSibling) { i.parentNode.insertBefore(i, i.previousElementSibling); updateData(); } }
    function moveProductDown(btn) { const i = btn.closest('.product-item'); if (i.nextElementSibling) { i.parentNode.insertBefore(i.nextElementSibling, i); updateData(); } }
    function removeProduct(btn) { if(confirm('❌ ลบสินค้านี้?')) { btn.closest('.product-item').remove(); updateData(); } }

    function createOptionRowHtml(availableSizes, selectedSizes) {
        let pillsHtml = availableSizes.map(s => `<div class="pill ${selectedSizes.includes(s) ? 'active' : ''}" onclick="togglePill(this)" data-size="${s}">${s}</div>`).join('');
        return `<div class="option-row"><div class="size-pills">${pillsHtml}</div><button class="icon-btn" title="แก้ไขไซส์" onclick="editPillsList(this)">${ICON_DOTS}</button></div>`;
    }

    function createProductItemElement(name = '', price = '', qty = 1, optionRowsArray = null) {
        const newItem = document.createElement('div'); newItem.className = 'product-item';
        let rows = optionRowsArray !== null ? (optionRowsArray.length === 0 ? [{availableSizes:['-'], selectedSizes:[]}] : optionRowsArray) : [{availableSizes:['S','M','L','XL','2XL'], selectedSizes:[]}];
        newItem.innerHTML = `
            <div class="product-header-row">
                <input type="text" class="productName" placeholder="ชื่อสินค้า" value="${name}" oninput="updateData()">
                <input type="number" class="productPrice" placeholder="ราคา" value="${price}" oninput="updateData()">
                <input type="number" class="productQty" placeholder="ชิ้น" value="${qty || 1}" min="1" oninput="updateData()">
                <div class="product-actions">
                    <button class="icon-btn" onclick="moveProductUp(this)">${ICON_UP}</button>
                    <button class="icon-btn" onclick="moveProductDown(this)">${ICON_DOWN}</button>
                    <button class="icon-btn" onclick="cloneProduct(this)">${ICON_COPY}</button>
                    <button class="icon-btn" onclick="removeProduct(this)" style="color:var(--danger)">${ICON_TRASH}</button>
                </div>
            </div>
            <div class="product-options-container">${rows.map(r => createOptionRowHtml(r.availableSizes, r.selectedSizes)).join('')}</div>
            <button class="btn-text" style="font-size:0.85rem;" onclick="addOptionRow(this)">+ เพิ่มแถวตัวเลือก</button>
        `;
        return newItem;
    }

    function addOptionRow(btn) {
        const s = prompt('ตั้งค่าตัวเลือก (คั่นด้วยลูกน้ำ ,):');
        if (s && s.trim()) { btn.previousElementSibling.insertAdjacentHTML('beforeend', createOptionRowHtml(s.split(',').map(x=>x.trim()).filter(x=>x), [])); updateData(); }
    }

    function cloneProduct(btn) {
        const item = btn.closest('.product-item');
        const rows = Array.from(item.querySelectorAll('.option-row')).map(r => ({ availableSizes: Array.from(r.querySelectorAll('.pill[data-size]')).map(p=>p.getAttribute('data-size')), selectedSizes: [] }));
        item.parentNode.insertBefore(createProductItemElement(item.querySelector('.productName').value, item.querySelector('.productPrice').value, 1, rows), item.nextSibling);
        updateData();
    }

    function togglePill(pill) { pill.classList.toggle('active'); updateData(); }

    function editPillsList(btn) {
        const container = btn.closest('.option-row');
        const current = Array.from(container.querySelectorAll('.pill[data-size]')).map(p=>p.getAttribute('data-size'));
        const s = prompt('ตั้งค่าปุ่ม (คั่นด้วยลูกน้ำ ,)\n* ลบข้อความเพื่อลบแถว:', current.join(','));
        if (s !== null) {
            let arr = s.split(',').map(x=>x.trim()).filter(x=>x);
            if (arr.length === 0) {
                if (container.closest('.product-item').querySelectorAll('.option-row').length <= 1) arr = ['-'];
                else { container.remove(); updateData(); return; }
            }
            container.outerHTML = createOptionRowHtml(arr, Array.from(container.querySelectorAll('.pill.active')).map(p=>p.getAttribute('data-size')));
            updateData();
        }
    }

    function copyText(id) { const el = document.getElementById(id); if(el.value.trim()){ el.select(); document.execCommand('copy'); window.getSelection().removeAllRanges(); } }

    function exportData() {
        saveData();
        const exportObj = {
            version: "v12.0",
            collections: JSON.parse(localStorage.getItem('orderDataV12')) || [],
            banks: JSON.parse(localStorage.getItem('bankDataV12')) || defaultBanks,
            selectedBank: localStorage.getItem('bankV12') || '',
            settings: {
                val_shipping: localStorage.getItem('val_shipping') || '50', val_special: localStorage.getItem('val_special') || '50', val_deposit: localStorage.getItem('val_deposit') || '100',
                check_shipping: localStorage.getItem('check_shipping') === 'true', check_special: localStorage.getItem('check_special') === 'true', check_deposit: localStorage.getItem('check_deposit') === 'true',
            }
        };
        const dataStr = JSON.stringify(exportObj); const encodedData = btoa(encodeURIComponent(dataStr));
        navigator.clipboard.writeText(encodedData).then(() => alert('📋 คัดลอกโค้ดสำเร็จ!')).catch(() => prompt('คัดลอกโค้ดนี้:', encodedData));
    }

    function importData() {
        const code = prompt('📥 วางโค้ดที่คัดลอกมา:');
        if (!code) return;
        try {
            const parsedData = JSON.parse(decodeURIComponent(atob(code)));
            if (Array.isArray(parsedData)) localStorage.setItem('orderDataV12', JSON.stringify(parsedData));
            else if (parsedData && parsedData.collections) {
                localStorage.setItem('orderDataV12', JSON.stringify(parsedData.collections));
                if (parsedData.banks) localStorage.setItem('bankDataV12', JSON.stringify(parsedData.banks));
                if (parsedData.selectedBank) localStorage.setItem('bankV12', parsedData.selectedBank);
                if (parsedData.settings) {
                    ['val_shipping', 'val_special', 'val_deposit', 'check_shipping', 'check_special', 'check_deposit'].forEach(key => {
                        if(parsedData.settings[key] !== undefined) localStorage.setItem(key, parsedData.settings[key]);
                    });
                }
            }
            renderBanks(); loadData(); updateData(); alert('✅ นำเข้าสำเร็จ!');
        } catch(e) { alert('❌ โค้ดไม่ถูกต้อง'); }
    }
